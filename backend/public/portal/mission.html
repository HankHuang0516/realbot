                </label>`;
            }).join('');

            if (!entityCheckboxes) entityCheckboxes = '<div style="color:var(--text-muted);font-size:12px;">No bound entities</div>';

            const tplBtnLabel = (() => {
                if (isEdit && soul?.templateId) {
                    const t = SOUL_TEMPLATES.find(x => x.id === soul.templateId);
                    return `🎭 ${esc(t ? getSoulTemplateName(t) : soul.templateId)}`;
                }
                return esc(i18n.t('mc_dlg_soul_template_btn'));
            })();

            let html = `<div class="dialog-overlay">
                <div class="dialog">
                    <div class="dialog-title">${isEdit ? i18n.t('mc_dlg_edit_soul') : i18n.t('mc_dlg_add_soul')}</div>
                    <button id="dlgTemplateBtn" class="btn btn-outline" onclick="showSoulGallery()" style="margin-bottom:12px;width:100%;">${tplBtnLabel}</button>
                    <input type="hidden" id="dlg_soul_template_id" value="${esc(soul?.templateId || '')}" />
                    <div class="dialog-field-label">${i18n.t('mc_dlg_soul_name')}</div>
                    <input id="dlg_soul_name" placeholder="${i18n.t('mc_dlg_soul_name')}" value="${esc(soul?.name || '')}" />
                    <div class="dialog-field-label">${i18n.t('mc_dlg_soul_desc')}</div>
                    <textarea id="dlg_soul_desc" placeholder="${i18n.t('mc_dlg_soul_desc_hint')}">${esc(soul?.description || '')}</textarea>
                    <div class="dialog-field-label">${i18n.t('mc_dlg_category')}</div>
                    <select id="dlg_soul_category">
                        ${renderCategorySelectHtml('souls', soul?.category)}
                    </select>
                    <div class="dialog-field-label">${i18n.t('mc_dlg_assign') || '指派實體'} (${i18n.t('mc_dlg_soul_multi') || '可多選'})</div>
                    <div class="entity-checkbox-grid" id="dlg_soul_entities">${entityCheckboxes}</div>
                    <div class="dialog-actions">
                        <button class="btn btn-outline" onclick="closeDialog()">${i18n.t('mc_dlg_cancel')}</button>
                        <button class="btn btn-primary" id="dlgSaveBtn">${i18n.t('mc_dlg_save')}</button>
                    </div>
                </div>
            </div>`;

            c.innerHTML = html;

            document.getElementById('dlgSaveBtn').onclick = () => {
                const name = document.getElementById('dlg_soul_name').value.trim();
                if (!name) return;
                const description = document.getElementById('dlg_soul_desc').value.trim();
                const templateId = document.getElementById('dlg_soul_template_id').value || null;
                const selectedEntities = Array.from(document.querySelectorAll('.soul-entity-cb:checked')).map(cb => cb.value);
                const category = document.getElementById('dlg_soul_category').value || null;

                if (isEdit) {
                    soul.name = name;
                    soul.description = description;
                    soul.templateId = templateId;
                    soul.assignedEntities = selectedEntities;
                    soul.category = category;
                    soul.updatedAt = Date.now();
                } else {
                    dashboard.souls.push({
                        id: genId(),
                        name,
                        description,
                        templateId,
                        assignedEntities: selectedEntities,
                        isActive: true,
                        category,
                        createdAt: Date.now(),
                        updatedAt: Date.now(),
                        createdBy: 'user'
                    });
                }
                markChanged();
                renderSouls();
                closeDialog();
            };

            setTimeout(() => document.getElementById('dlg_soul_name').focus(), 50);
        }

        function toggleSoul(id) {
            const soul = dashboard.souls.find(s => s.id === id);
            if (!soul) return;
            soul.isActive = !soul.isActive;
            soul.updatedAt = Date.now();
            markChanged();
        }

        function deleteSoul(id) {
            if (confirm(i18n.t('mc_confirm_delete'))) {
                dashboard.souls = dashboard.souls.filter(s => s.id !== id);
                markChanged();
                renderSouls();
            }
        }

        function showSoulMenu(e, id) {
            e.preventDefault();
            const menu = document.getElementById('contextMenu');
            menu.innerHTML = `<div class="context-menu-item">${i18n.t('mc_menu_delete')}</div>`;
            menu.style.display = 'block';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
            menu.style.top = e.clientY + 'px';

            menu.querySelector('.context-menu-item').onclick = () => {
                if (confirm(i18n.t('mc_confirm_delete'))) {
                    dashboard.souls = dashboard.souls.filter(s => s.id !== id);
                    markChanged();
                    renderSouls();
                }
                menu.style.display = 'none';
            };

            setTimeout(() => document.addEventListener('click', () => menu.style.display = 'none', { once: true }), 10);
        }

        // Add soul change detection for notify
        function isSoulChanged(soul) {
            if (!lastNotifiedDashboard) return true;
            const prev = (lastNotifiedDashboard.souls || []).find(p => p.id === soul.id);
            if (!prev) return true;
            return soul.name !== prev.name || soul.description !== prev.description
                || soul.templateId !== prev.templateId || soul.isActive !== prev.isActive
                || JSON.stringify(soul.assignedEntities || []) !== JSON.stringify(prev.assignedEntities || []);
        }

        // --- Auto-save & auto-notify on exit ---
        async function saveAndNotifyOnExit() {
            if (refreshTimer) clearInterval(refreshTimer);

            // Flush pending auto-save
            if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }

            // Save if there are pending changes
            if (hasChanges && !isSyncing) {
                try {
                    const data = await apiCall('POST', '/api/mission/dashboard', {
                        deviceId: currentUser.deviceId,
                        deviceSecret: currentUser.deviceSecret,
                        version: version,
                        dashboard: dashboard
                    });
                    if (data.success) {
                        version = data.version || version + 1;
                        hasChanges = false;
                        lastSavedDashboard = JSON.parse(JSON.stringify(dashboard));
                    }
                } catch (e) {
                    console.warn('Exit auto-save failed:', e.message);
                }
            }

            // Auto-notify all changed items (no prompt)
            const items = getNotifiableItems();
            if (items.length > 0) {
                const notifications = items.map(item => ({
                    type: item.type,
                    title: item.title,
                    priority: item.priority,
                    entityIds: item.entityIds,
                    url: item.url || ''
                }));
                apiCall('POST', '/api/mission/notify', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    notifications
                }).catch(() => {});
                updateNotifiedSnapshot();
            }
        }

        // Use visibilitychange (reliable) + beforeunload (fallback)
        let exitHandled = false;
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && !exitHandled) {
                exitHandled = true;
                saveAndNotifyOnExit();
                // Reset after a short delay in case user comes back
                setTimeout(() => { exitHandled = false; }, 3000);
            }
        });
        window.addEventListener('beforeunload', () => {
            if (!exitHandled) {
                exitHandled = true;
                saveAndNotifyOnExit();
            }
        });
    </script>
</body>

</html>
