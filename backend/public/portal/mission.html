<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title data-i18n="mc_title">EClawbot - Mission Control</title>
    <meta name="description" content="EClawbot mission control — manage todos, missions, notes, and rules for your AI agents.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <link rel="stylesheet" href="shared/style.css">
    <style>
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* Sub-tab navigation */
        .sub-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .sub-tab {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sub-tab:hover {
            color: var(--text);
        }

        .sub-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Card sections */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .card-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        /* List items */
        .mc-item {
            background: var(--input-bg);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .mc-item:hover {
            background: #2E2E50;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-priority {
            flex-shrink: 0;
            font-size: 14px;
        }

        .item-title {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
            background: var(--card-border);
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .item-detail {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-done {
            color: var(--success);
            font-size: 11px;
            margin-top: 4px;
            text-align: right;
        }

        .mc-empty {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            padding: 20px;
        }

        /* Sync bar */
        .sync-bar {
            text-align: right;
            color: var(--text-muted);
            font-size: 11px;
            padding: 8px 0;
        }

        /* Context menu */
        .context-menu {
            position: fixed;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            padding: 4px 0;
            z-index: 300;
            min-width: 160px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .context-menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text);
            transition: background 0.1s;
        }

        .context-menu-item:hover {
            background: var(--card-border);
        }

        /* Toggle switch for rules */
        .switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch .slider {
            position: absolute;
            inset: 0;
            background: var(--card-border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: 0.3s;
        }

        .switch .slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 2px;
            bottom: 2px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: 0.3s;
        }

        .switch input:checked+.slider {
            background: var(--primary);
        }

        .switch input:checked+.slider::before {
            transform: translateX(18px);
            background: #fff;
        }

        /* Dialog form inputs (scoped to dialog, exclude checkboxes/radios) */
        .dialog input:not([type="checkbox"]):not([type="radio"]),
        .dialog textarea,
        .dialog select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 10px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .dialog input:not([type="checkbox"]):not([type="radio"]):focus,
        .dialog textarea:focus,
        .dialog select:focus {
            border-color: var(--primary);
        }

        /* Entity checkbox grid */
        .entity-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px 16px;
        }

        .entity-checkbox-grid label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            min-height: 44px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }

        .entity-checkbox-grid label:hover {
            background: var(--input-bg);
        }

        .entity-checkbox-grid input[type="checkbox"] {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Template gallery */
        .tpl-selected-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
        }
        .tpl-selected-label {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tpl-gallery-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .tpl-gallery-card:hover { border-color: var(--primary); }
        .tpl-gallery-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
        .tpl-gallery-info { flex: 1; min-width: 0; }
        .tpl-gallery-title { font-weight: 600; font-size: 14px; }
        .tpl-gallery-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .tpl-gallery-status { font-size: 11px; margin-top: 4px; }
        .tpl-gallery-status.ok { color: var(--success); }
        .tpl-gallery-status.warn { color: var(--warning-hover); }

        #dlg_skill_steps {
            min-height: 160px;
            resize: vertical;
            font-size: 12px;
            line-height: 1.6;
        }

        /* Variables section */
        .vars-notice {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .var-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--input-bg);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .var-item:hover { background: var(--hover-bg, rgba(255,255,255,0.06)); }

        .var-key {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
            flex: 0 0 auto;
            color: var(--primary);
        }

        .var-sep { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

        .var-val {
            flex: 1;
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .var-show-btn {
            font-size: 11px;
            color: var(--text-muted);
            cursor: pointer;
            flex-shrink: 0;
            border: none;
            background: transparent;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
        }

        .var-show-btn:hover { background: var(--input-bg); color: var(--text); }

        .vars-sync-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .vars-sync-status { font-size: 11px; color: var(--text-muted); }
        .vars-sync-status.ok { color: var(--success, #4caf50); }
        .vars-sync-status.err { color: var(--danger, #f44336); }

        /* Category folder */
        .cat-folder {
            margin-bottom: 8px;
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }

        .cat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .cat-header:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .cat-chevron {
            font-size: 10px;
            color: var(--text-muted);
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .cat-chevron.open {
            transform: rotate(90deg);
        }

        .cat-name {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .cat-name-input {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            background: var(--input-bg);
            border: 1px solid var(--primary);
            border-radius: 3px;
            color: var(--text);
            padding: 2px 6px;
            outline: none;
        }

        .cat-count {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .cat-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .cat-header:hover .cat-actions {
            opacity: 1;
        }

        .cat-action-btn {
            width: 22px;
            height: 22px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .cat-action-btn:hover {
            background: var(--card-border);
            color: var(--text);
        }

        .cat-action-btn.danger:hover {
            background: var(--danger);
            color: #fff;
        }

        .cat-body {
            padding: 4px 8px 8px;
        }

        .cat-body.collapsed {
            display: none;
        }

        /* Drag-and-drop */
        .mc-item[draggable="true"] {
            cursor: grab;
        }

        .mc-item[draggable="true"]:active {
            cursor: grabbing;
        }

        .mc-item.dragging {
            opacity: 0.4;
        }

        .cat-folder.drag-over .cat-header {
            background: rgba(108, 92, 231, 0.15);
            border-color: var(--primary);
        }

        .cat-uncategorized-drop.drag-over {
            background: rgba(108, 92, 231, 0.1);
            border-radius: var(--radius-sm);
        }

        /* Add category button */
        .add-cat-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--text-muted);
            background: none;
            border: 1px dashed var(--card-border);
            border-radius: var(--radius-sm);
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .add-cat-btn:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .section-header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* Inline delete button on sub-items */
        .item-delete {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            opacity: 0.5;
        }

        .mc-item:hover .item-delete {
            opacity: 1;
        }

        .item-delete:hover {
            background: var(--danger);
            color: #fff;
            opacity: 1;
        }

        .dialog input::placeholder,
        .dialog textarea::placeholder {
            color: var(--text-muted);
        }

        .dialog textarea {
            min-height: 80px;
            resize: vertical;
        }

        .dialog select {
            cursor: pointer;
        }

        .dialog select option {
            background: var(--input-bg);
            color: var(--text);
        }

        .dialog-field-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        /* Loading state */
        .loading-center {
            text-align: center;
            padding: 40px 0;
        }

        .loading-center .spinner {
            margin: 0 auto 12px;
        }

        @media (max-width: 640px) {
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-actions {
                width: 100%;
            }

            .header-actions .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title" data-i18n="nav_mission">Mission</h1>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="downloadDashboard()" data-i18n="mc_refresh">Refresh</button>
            </div>
        </div>

        <!-- Sub-tab Navigation -->
        <div class="sub-tabs">
            <a class="sub-tab active" href="mission.html">🎯 <span data-i18n="mc_title">Mission Control</span></a>
            <a class="sub-tab" href="schedule.html">📅 <span data-i18n="nav_schedule">Schedule</span></a>
            <a class="sub-tab" href="env-vars.html">🔐 Env Variables</a>
            <a class="sub-tab" href="screen-control.html">📱 Remote Control</a>

        <!-- Loading State -->
        <div class="loading-center" id="loadingState">

            <div style="color:var(--text-secondary);">Loading...</div>

        <!-- Dashboard Content (hidden until loaded) -->

                        <button class="add-cat-btn" onclick="addCategory('todo')" data-i18n="mc_add_category">+ Category</button>
                        <button class="btn btn-outline btn-sm" onclick="showAddItem('todo')" data-i18n="mc_btn_add">+ Add</button>
                    </div>
                </div>
                <div id="todoList"></div>
            </div>

            <!-- Mission -->
            <div class="card">
                <div class="card-header">
                    <h2>🎯 <span data-i18n="mc_mission_title">Mission</span></h2>
                    <div class="section-header-actions">
                        <button class="add-cat-btn" onclick="addCategory('mission')" data-i18n="mc_add_category">+ Category</button>
                    </div>
                </div>
                <div id="missionList"></div>
            </div>

            <!-- Done -->
            <div class="card">
                <div class="card-header">
                    <h2>✅ <span data-i18n="mc_done_title">Done</span></h2>
                    <div class="section-header-actions">
                        <button class="add-cat-btn" onclick="addCategory('done')" data-i18n="mc_add_category">+ Category</button>
                    </div>
                </div>
                <div id="doneList"></div>
            </div>

            <!-- Notes -->
            <div class="card">
                <div class="card-header">
                    <h2>📝 <span data-i18n="mc_notes_title">Notes</span></h2>
                    <div class="section-header-actions">
                        <button class="add-cat-btn" onclick="addCategory('notes')" data-i18n="mc_add_category">+ Category</button>
                        <button class="btn btn-outline btn-sm" onclick="showAddNote()" data-i18n="mc_btn_add">+ Add</button>
                    </div>
                </div>
                <div id="notesList"></div>
            </div>

            <!-- Skills -->
            <div class="card">
                <div class="card-header">
                    <h2>🔧 Skills</h2>
                    <div class="section-header-actions">
                        <button class="add-cat-btn" onclick="addCategory('skills')" data-i18n="mc_add_category">+ Category</button>
                        <button class="btn btn-outline btn-sm" onclick="showAddSkill()">+ Add</button>
                    </div>
                </div>
                <div id="skillsList"></div>
            </div>

            <!-- Souls -->
            <div class="card">
                <div class="card-header">
                    <h2>🧠 <span data-i18n="mc_souls_title">Souls</span></h2>
                    <div class="section-header-actions">
                        <button class="add-cat-btn" onclick="addCategory('souls')" data-i18n="mc_add_category">+ Category</button>

                    </div>

            <!-- Rules -->
            <div class="card">
                <div class="card-header">
                    <h2>📏 <span data-i18n="mc_rules_title">Rules</span></h2>
                    <div class="section-header-actions">
                        <button class="add-cat-btn" onclick="addCategory('rules')" data-i18n="mc_add_category">+ Category</button>

    <div id="dialogContainer"></div>
    <!-- Context menu container -->
    <div id="contextMenu" class="context-menu" style="display:none"></div>

    <script src="../shared/i18n.js"></script>

    <script>if(typeof renderAvatarHtml==='undefined'){window.renderAvatarHtml=function(a){return a||'\u{1F99E}'};window.isAvatarUrl=function(){return false}}</script>
    <script>
        // --- State ---
        let dashboard = { todoList: [], missionList: [], doneList: [], notes: [], rules: [], skills: [], souls: [], categoryOrder: {} };
        let lastSavedDashboard = null; // snapshot for auto-save conflict detection
        let lastNotifiedDashboard = null; // snapshot for notification diff (updated only on notify/skip)
        let version = 1;
        let hasChanges = false;
        let isSyncing = false;
        let autoSaveTimer = null;
        let refreshTimer = null;
        let boundEntities = [];

        // ENTITY_CHARS_DEFAULT, getAvatarForEntity, getEntityDisplayName, getEntityLabel
        // are provided by shared/entity-utils.js

        // --- Helpers ---
        const getPriorityLabel = (p) => {
            const map = {
                1: i18n.t('mc_priority_low'),
                2: i18n.t('mc_priority_medium'),
                3: i18n.t('mc_priority_high'),
                4: i18n.t('mc_priority_urgent')
            };
            return map[p] || i18n.t('mc_priority_medium');
        };

        const getStatusLabel = (s) => {
            const map = {
                PENDING: i18n.t('mc_status_pending'),
                IN_PROGRESS: i18n.t('mc_status_inprogress'),
                BLOCKED: i18n.t('mc_status_blocked'),
                DONE: i18n.t('mc_status_done'),
                CANCELLED: i18n.t('mc_status_cancelled')
            };
            return map[s] || s || i18n.t('mc_status_pending');
        };

        function genId() {
            return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        function fmtDate(ts) {
            if (!ts) return '-';
            const d = new Date(ts);
            return `${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')} ${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        function markChanged() {
            hasChanges = true;
            renderSyncBar();
            debouncedAutoSave();
        }

        function debouncedAutoSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => autoSave(), 2000);
        }

        async function autoSave() {
            if (!hasChanges || isSyncing) return;
            isSyncing = true;
            renderSyncBar();
            try {
                const data = await apiCall('POST', '/api/mission/dashboard', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    version: version,
                    dashboard: dashboard
                });
                if (data.success) {
                    version = data.version || version + 1;
                    hasChanges = false;
                    lastSavedDashboard = JSON.parse(JSON.stringify(dashboard));
                } else if (data.error === 'VERSION_CONFLICT') {
                    // Silent conflict — will resolve on next manual refresh or auto-refresh
                    console.warn('Auto-save version conflict, will retry on next change');
                }
            } catch (e) {
                console.warn('Auto-save failed:', e.message);
            }
            isSyncing = false;
            renderSyncBar();
        }

        // --- Init ---
        async function loadBoundEntities() {
            try {
                const data = await apiCall('GET', `/api/entities?deviceId=${currentUser.deviceId}`);
                boundEntities = (data.entities || []).filter(e => e.isBound);
                updateEntityMaps(boundEntities);
            } catch (e) {
                console.warn('Failed to load entities:', e.message);
            }
        }

        function getEntityOptions(selectedId) {
            let opts = [{ value: '', label: i18n.t('mc_assign_none') || '-- 不指定 --' }];
            boundEntities.forEach(e => {
                const avatar = getAvatarForEntity(e.entityId);
                const name = getEntityDisplayName(e.entityId);
                opts.push({ value: String(e.entityId), label: `${renderAvatarHtml(avatar, 18)} ${name} (#${e.entityId})` });
            });
            return opts;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            renderNav('mission');
            if (typeof renderFooter === 'function') renderFooter();
            const user = await checkAuth();
            if (!user) return;
            initPortalSocket();

            _categoryState = loadCategoryState();
            await loadBoundEntities();
            await loadSkillTemplates();
            loadSoulTemplates();
            loadRuleTemplates();
            await downloadDashboard();
            syncVarsToServer(); // auto-sync local vars to server in-memory on load

            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('dashboardContent').style.display = '';

            // Auto-refresh every 30s (skip if editing or syncing)
            refreshTimer = setInterval(() => {
                const dialogOpen = document.getElementById('dialogContainer').innerHTML.trim() !== '';
                if (!hasChanges && !isSyncing && !dialogOpen) downloadDashboard();
            }, 30000);

            // Re-render on language change
            i18n.onLanguageChange(() => {
                renderAll();
            });
        });

        // --- API ---
        async function downloadDashboard() {
            try {
                const data = await apiCall('GET',
                    `/api/mission/dashboard?deviceId=${encodeURIComponent(currentUser.deviceId)}&deviceSecret=${encodeURIComponent(currentUser.deviceSecret)}`
                );
                if (data.success && data.dashboard) {
                    applyDashboard(data.dashboard);
                }
            } catch (e) {
                console.error('Refresh failed:', e);
                // Only show error on first load
                if (document.getElementById('loadingState').style.display !== 'none') {
                    showToast('Failed to load dashboard: ' + e.message, 'error');
                }
            }
        }

        // publishNotification: the main button action — save first if needed, then show notify prompt
        async function publishNotification() {
            const btn = document.getElementById('btnNotify');
            btn.disabled = true;

            // Flush any pending auto-save first
            if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }
            if (hasChanges) {
                isSyncing = true;
                renderSyncBar();
                try {
                    const data = await apiCall('POST', '/api/mission/dashboard', {
                        deviceId: currentUser.deviceId,
                        deviceSecret: currentUser.deviceSecret,
                        version: version,
                        dashboard: dashboard
                    });
                    if (data.success) {
                        version = data.version || version + 1;
                        hasChanges = false;
                        lastSavedDashboard = JSON.parse(JSON.stringify(dashboard));
                    } else if (data.error === 'VERSION_CONFLICT') {
                        isSyncing = false;
                        renderSyncBar();
                        btn.disabled = false;
                        if (confirm(i18n.t('mc_confirm_version', { you: version, server: data.currentVersion }))) {
                            await downloadDashboard();
                        }
                        return;
                    } else {
                        showToast('Upload failed: ' + (data.error || 'Unknown'), 'error');
                        isSyncing = false;
                        renderSyncBar();
                        btn.disabled = false;
                        return;
                    }
                } catch (e) {
                    showToast('Error: ' + e.message, 'error');
                    isSyncing = false;
                    renderSyncBar();
                    btn.disabled = false;
                    return;
                }
                isSyncing = false;
                renderSyncBar();
            }

            showNotifyPrompt();
            btn.disabled = false;
        }

        // ========== Notification Prompt ==========
        // Change detection helpers
        function isTodoChanged(item) {
            if (!lastNotifiedDashboard) return true;
            const prev = lastNotifiedDashboard.todoList.find(p => p.id === item.id);
            if (!prev) return true; // new item
            const pCur = item.priority?.value || item.priority;
            const pPrev = prev.priority?.value || prev.priority;
            return item.title !== prev.title || item.description !== prev.description
                || pCur !== pPrev || (item.assignedBot || '') !== (prev.assignedBot || '')
                || (item.status?.name || item.status) !== (prev.status?.name || prev.status);
        }

        function isSkillChanged(skill) {
            if (!lastNotifiedDashboard) return true;
            const prev = lastNotifiedDashboard.skills.find(p => p.id === skill.id);
            if (!prev) return true;
            return skill.title !== prev.title || skill.url !== prev.url
                || (skill.steps || '') !== (prev.steps || '')
                || JSON.stringify(skill.assignedEntities || []) !== JSON.stringify(prev.assignedEntities || []);
        }

        function isRuleChanged(rule) {
            if (!lastNotifiedDashboard) return true;
            const prev = lastNotifiedDashboard.rules.find(p => p.id === rule.id);
            if (!prev) return true;
            return rule.name !== prev.name || rule.description !== prev.description
                || (rule.ruleType?.name || rule.ruleType) !== (prev.ruleType?.name || prev.ruleType)
                || rule.isEnabled !== prev.isEnabled
                || JSON.stringify(rule.assignedEntities || []) !== JSON.stringify(prev.assignedEntities || []);
        }

        function getNotifiableItems() {
            const items = [];
            // TODO items with assigned entity - only if changed
            dashboard.todoList.forEach(item => {
                const p = item.priority?.value || item.priority || 2;
                if (item.assignedBot && isTodoChanged(item)) {
                    const botIds = String(item.assignedBot).split(',').map(s => s.trim()).filter(Boolean);
                    const botLabels = botIds.map(id => getEntityLabel(parseInt(id))).join(', ');
                    items.push({
                        type: 'TODO',
                        title: item.title,
                        priority: p,
                        entityIds: botIds,
                        label: `📋 ${esc(item.title)} → ${botLabels}`
                    });
                }
            });
            // SKILL items with assigned entities - only if changed
            dashboard.skills.forEach(skill => {
                if (skill.assignedEntities && skill.assignedEntities.length > 0 && isSkillChanged(skill)) {
                    const entLabels = skill.assignedEntities.map(id => getEntityLabel(parseInt(id))).join(', ');
                    items.push({
                        type: 'SKILL',
                        title: skill.title,
                        url: skill.url || '',
                        priority: 0,
                        entityIds: skill.assignedEntities,
                        label: `🔧 ${esc(skill.title)} → ${entLabels}`
                    });
                }
            });
            // RULE items with assigned entities - only if changed
            dashboard.rules.forEach(rule => {
                if (rule.assignedEntities && rule.assignedEntities.length > 0 && rule.isEnabled !== false && isRuleChanged(rule)) {
                    const entLabels = rule.assignedEntities.map(id => getEntityLabel(parseInt(id))).join(', ');
                    items.push({
                        type: 'RULE',
                        title: rule.name,
                        priority: 0,
                        entityIds: rule.assignedEntities,
                        label: `📏 ${esc(rule.name)} → ${entLabels}`
                    });
                }
            });
            // SOUL items with assigned entities - only if changed
            (dashboard.souls || []).forEach(soul => {
                if (soul.assignedEntities && soul.assignedEntities.length > 0 && soul.isActive !== false && isSoulChanged(soul)) {
                    const entLabels = soul.assignedEntities.map(id => getEntityLabel(parseInt(id))).join(', ');
                    items.push({
                        type: 'SOUL',
                        title: soul.name,
                        priority: 0,
                        entityIds: soul.assignedEntities,
                        label: `🧠 ${esc(soul.name)} → ${entLabels}`
                    });
                }
            });
            return items;
        }

        function showNotifyPrompt() {
            const items = getNotifiableItems();
            if (items.length === 0) {
                showToast(i18n.t('mc_no_notify_items'), 'info');
                return;
            }

            const c = document.getElementById('dialogContainer');
            const checkboxes = items.map((item, idx) =>
                `<label style="display:flex;align-items:center;gap:8px;margin:6px 0;cursor:pointer;">
                    <input type="checkbox" class="notify-cb" data-idx="${idx}" checked>
                    <span style="font-size:13px;">${item.label}</span>
                </label>`
            ).join('');

            let html = `<div class="dialog-overlay" onclick="if(event.target===this)closeDialog()">
                <div class="dialog">
                    <div class="dialog-title">${i18n.t('mc_notify_dialog_title')}</div>
                    <div style="color:var(--text-secondary);font-size:13px;margin-bottom:12px;">
                        ${i18n.t('mc_notify_dialog_desc')}
                    </div>
                    <div style="margin-bottom:12px;">${checkboxes}</div>
                    <div class="dialog-actions">
                        <button class="btn btn-outline" onclick="updateNotifiedSnapshot(); closeDialog();">${i18n.t('mc_notify_skip')}</button>
                        <button class="btn btn-primary" id="dlgNotifyBtn">${i18n.t('mc_notify_send')}</button>
                    </div>
                </div>
            </div>`;

            c.innerHTML = html;

            document.getElementById('dlgNotifyBtn').onclick = async () => {
                const selectedIdxs = Array.from(document.querySelectorAll('.notify-cb:checked')).map(cb => parseInt(cb.dataset.idx));
                if (selectedIdxs.length === 0) { updateNotifiedSnapshot(); closeDialog(); return; }

                const notifications = selectedIdxs.map(idx => ({
                    type: items[idx].type,
                    title: items[idx].title,
                    priority: items[idx].priority,
                    entityIds: items[idx].entityIds,
                    url: items[idx].url || ''
                }));

                // Fire-and-forget, then navigate to chat page
                apiCall('POST', '/api/mission/notify', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    notifications
                }).catch(() => {});
                updateNotifiedSnapshot();
                closeDialog();
                window.location.href = 'chat.html';
            };
        }

        function updateNotifiedSnapshot() {
            lastNotifiedDashboard = JSON.parse(JSON.stringify(dashboard));
        }

        function applyDashboard(d) {
            dashboard = {
                todoList: d.todoList || [],
                missionList: d.missionList || [],
                doneList: d.doneList || [],
                notes: d.notes || [],
                rules: d.rules || [],
                skills: d.skills || [],
                souls: d.souls || [],
                categoryOrder: d.categoryOrder || {}
            };
            version = d.version || 1;
            hasChanges = false;
            lastSavedDashboard = JSON.parse(JSON.stringify(dashboard));
            if (!lastNotifiedDashboard) lastNotifiedDashboard = JSON.parse(JSON.stringify(dashboard));
            renderAll();
        }

        // ========== Category Helpers ==========
        const SECTION_LIST_KEY = {
            todo: 'todoList', mission: 'missionList', done: 'doneList',
            notes: 'notes', skills: 'skills', souls: 'souls', rules: 'rules'
        };

        const SECTION_RENDER_FN = {
            todo: () => renderTodo(), mission: () => renderMission(), done: () => renderDone(),
            notes: () => renderNotes(), skills: () => renderSkills(), souls: () => renderSouls(), rules: () => renderRules()
        };

        function getListForSection(section) {
            const key = SECTION_LIST_KEY[section];
            return key ? dashboard[key] : [];
        }

        function getCategoryOrder(section) {
            return dashboard.categoryOrder[section] || [];
        }

        function setCategoryOrder(section, order) {
            if (!dashboard.categoryOrder) dashboard.categoryOrder = {};
            dashboard.categoryOrder[section] = order;
        }

        // categoryState stored in localStorage (UI-only, not persisted to server)
        const _catStateKey = () => `mc_catState_${currentUser.deviceId}`;

        function loadCategoryState() {
            try {
                return JSON.parse(localStorage.getItem(_catStateKey()) || '{}');
            } catch { return {}; }
        }

        function saveCategoryState(state) {
            try { localStorage.setItem(_catStateKey(), JSON.stringify(state)); } catch {}
        }

        let _categoryState = {};

        function isCategoryExpanded(section, cat) {
            return _categoryState[`${section}:${cat}`] !== false;
        }

        function toggleCategoryState(section, cat) {
            _categoryState[`${section}:${cat}`] = !isCategoryExpanded(section, cat);
            saveCategoryState(_categoryState);
            const renderFn = SECTION_RENDER_FN[section];
            if (renderFn) renderFn();
        }

        function groupByCategory(items, section) {
            const order = getCategoryOrder(section);
            const groups = {};
            const uncategorized = [];

            items.forEach(item => {
                const cat = item.category;
                if (cat) {
                    if (!groups[cat]) groups[cat] = [];
                    groups[cat].push(item);
                } else {
                    uncategorized.push(item);
                }
            });

            const result = [];
            const seen = new Set();
            order.forEach(cat => {
                seen.add(cat);
                result.push({ category: cat, items: groups[cat] || [] });
            });
            // Auto-register new categories found in items
            let orderChanged = false;
            Object.keys(groups).forEach(cat => {
                if (!seen.has(cat)) {
                    result.push({ category: cat, items: groups[cat] });
                    order.push(cat);
                    orderChanged = true;
                }
            });
            if (orderChanged) setCategoryOrder(section, order);

            return { categorized: result, uncategorized };
        }

        function renderCategoryFolder(section, cat, itemsHtml, count) {
            const expanded = isCategoryExpanded(section, cat);
            const catAttr = esc(cat);
            return `<div class="cat-folder" data-section="${section}" data-category="${catAttr}"
                        ondragover="onDropZoneDragOver(event)" ondragleave="onDropZoneDragLeave(event)" ondrop="onCatDrop(event)">
                <div class="cat-header" onclick="handleCatHeaderClick(this)">
                    <span class="cat-chevron ${expanded ? 'open' : ''}">&#9654;</span>
                    <span class="cat-name">${esc(cat)}</span>
                    <span class="cat-count">(${count})</span>
                    <div class="cat-actions" onclick="event.stopPropagation()">
                        <button class="cat-action-btn" onclick="handleCatAction(this,'rename')" title="${i18n.t('mc_rename_category')}">&#9998;</button>
                        <button class="cat-action-btn danger" onclick="handleCatAction(this,'clear')" title="${i18n.t('mc_clear_category')}">&#8709;</button>
                        <button class="cat-action-btn danger" onclick="handleCatAction(this,'delete')" title="${i18n.t('mc_delete_category')}">&times;</button>
                    </div>
                </div>
                <div class="cat-body ${expanded ? '' : 'collapsed'}">${itemsHtml}</div>
            </div>`;
        }

        // Read section/category from data attributes (avoids XSS via inline string interpolation)
        function getCatFolderData(el) {
            const folder = el.closest('.cat-folder');
            return { section: folder.dataset.section, category: folder.dataset.category };
        }

        function handleCatHeaderClick(headerEl) {
            const { section, category } = getCatFolderData(headerEl);
            toggleCategoryState(section, category);
        }

        function handleCatAction(btnEl, action) {
            const { section, category } = getCatFolderData(btnEl);
            if (action === 'rename') renameCategory(section, category);
            else if (action === 'clear') clearCategory(section, category);
            else if (action === 'delete') deleteCategory(section, category);
        }

        function addCategory(section) {
            const name = prompt(i18n.t('mc_prompt_category_name') || 'Category name:');
            if (!name || !name.trim()) return;
            const trimmed = name.trim().slice(0, 50);
            const order = getCategoryOrder(section);
            if (order.includes(trimmed)) {
                showToast(i18n.t('mc_category_exists') || 'Category already exists', 'info');
                return;
            }
            order.push(trimmed);
            setCategoryOrder(section, order);
            markChanged();
            renderAll();
        }

        function renameCategory(section, oldName) {
            const newName = prompt(i18n.t('mc_prompt_rename_category') || 'New category name:', oldName);
            if (!newName || !newName.trim() || newName.trim() === oldName) return;
            const trimmed = newName.trim().slice(0, 50);

            const order = getCategoryOrder(section);
            const idx = order.indexOf(oldName);
            if (idx >= 0) order[idx] = trimmed;
            setCategoryOrder(section, order);

            // Migrate localStorage state
            const oldKey = `${section}:${oldName}`;
            const newKey = `${section}:${trimmed}`;
            if (_categoryState[oldKey] !== undefined) {
                _categoryState[newKey] = _categoryState[oldKey];
                delete _categoryState[oldKey];
                saveCategoryState(_categoryState);
            }

            const list = getListForSection(section);
            list.forEach(item => {
                if (item.category === oldName) item.category = trimmed;
            });

            markChanged();
            renderAll();
        }

        function clearCategory(section, cat) {
            if (!confirm(i18n.t('mc_confirm_clear_category') || `Clear all items in "${cat}"?`)) return;
            const key = SECTION_LIST_KEY[section];
            if (key) dashboard[key] = dashboard[key].filter(item => item.category !== cat);
            markChanged();
            renderAll();
        }

        function deleteCategory(section, cat) {
            if (!confirm(i18n.t('mc_confirm_delete_category') || `Delete category "${cat}"? Items will become uncategorized.`)) return;

            const order = getCategoryOrder(section);
            const idx = order.indexOf(cat);
            if (idx >= 0) order.splice(idx, 1);
            setCategoryOrder(section, order);

            delete _categoryState[`${section}:${cat}`];
            saveCategoryState(_categoryState);

            const list = getListForSection(section);
            list.forEach(item => {
                if (item.category === cat) item.category = null;
            });

            markChanged();
            renderAll();
        }

        // Drag-and-drop handlers
        let draggedItemId = null;
        let draggedSection = null;

        function onItemDragStart(e, itemId, section) {
            draggedItemId = itemId;
            draggedSection = section;
            e.dataTransfer.effectAllowed = 'move';
            e.target.classList.add('dragging');
        }

        function onItemDragEnd(e) {
            e.target.classList.remove('dragging');
            draggedItemId = null;
            draggedSection = null;
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
        }

        function onDropZoneDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
        }

        function onDropZoneDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function onCatDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const folder = e.currentTarget.closest('.cat-folder');
            const section = folder ? folder.dataset.section : null;
            const targetCat = folder ? folder.dataset.category : null;
            if (!draggedItemId || !section || draggedSection !== section) return;

            const list = getListForSection(section);
            const item = list.find(i => i.id === draggedItemId);
            if (item) {
                item.category = targetCat || null;
                item.updatedAt = Date.now();
                markChanged();
                renderAll();
            }
        }

        function onUncatDrop(e, section) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!draggedItemId || draggedSection !== section) return;

            const list = getListForSection(section);
            const item = list.find(i => i.id === draggedItemId);
            if (item) {
                item.category = null;
                item.updatedAt = Date.now();
                markChanged();
                renderAll();
            }
        }

        function getCategoryOptions(section) {
            const order = getCategoryOrder(section);
            const opts = [{ value: '', label: i18n.t('mc_uncategorized') || '-- Uncategorized --' }];
            order.forEach(cat => opts.push({ value: cat, label: cat }));
            return opts;
        }

        function renderCategorySelectHtml(section, currentCategory) {
            return getCategoryOptions(section).map(o =>
                `<option value="${esc(o.value)}" ${o.value === (currentCategory || '') ? 'selected' : ''}>${esc(o.label)}</option>`
            ).join('');
        }

        // ========== Rendering ==========
        function renderAll() {
            renderTodo();
            renderMission();
            renderDone();
            renderNotes();
            renderSkills();
            renderSouls();
            renderRules();
            renderSyncBar();
        }

        function renderTaskItemHtml(item, listType) {
            const assignLabel = item.assignedBot != null && item.assignedBot !== ''
                ? String(item.assignedBot).split(',').map(id => getEntityLabel(parseInt(id.trim()))).join(', ')
                : '';
            return `
            <div class="mc-item" draggable="true" data-item-id="${item.id}"
                 ondragstart="onItemDragStart(event,'${item.id}','${listType}')" ondragend="onItemDragEnd(event)"
                 onclick="showEditItem('${item.id}','${listType}')" oncontextmenu="showItemMenu(event,'${item.id}','${listType}')">
                <div class="item-row">
                    <span class="item-priority">${(getPriorityLabel(item.priority?.value || item.priority)).slice(0, 2)}</span>
                    <span class="item-title">${esc(item.title)}</span>
                    ${assignLabel ? `<span class="item-badge">${assignLabel}</span>` : ''}
                    <span class="item-badge">${getStatusLabel(item.status?.name || item.status)}</span>
                    <button class="item-delete" onclick="event.stopPropagation();deleteItem('${item.id}','${listType}')" title="${i18n.t('common_delete')}">&times;</button>
                </div>
                ${item.description ? `<div class="item-detail">${esc(item.description)}</div>` : ''}
            </div>`;
        }

        function renderCategorizedList(el, items, section, listType, renderItemFn, emptyKey) {
            if (!items.length && !getCategoryOrder(section).length) {
                el.innerHTML = `<div class="mc-empty">${i18n.t(emptyKey)}</div>`;
                return;
            }
            const { categorized, uncategorized } = groupByCategory(items, section);
            let html = '';
            categorized.forEach(g => {
                const itemsHtml = g.items.map(item => renderItemFn(item, listType)).join('');
                html += renderCategoryFolder(section, g.category, itemsHtml || `<div class="mc-empty" style="padding:8px;">${i18n.t('mc_empty_category')}</div>`, g.items.length);
            });
            if (uncategorized.length) {
                html += `<div class="cat-uncategorized-drop" ondragover="onDropZoneDragOver(event)" ondragleave="onDropZoneDragLeave(event)" ondrop="onUncatDrop(event,'${section}')">`;
                html += uncategorized.map(item => renderItemFn(item, listType)).join('');
                html += '</div>';
            } else if (categorized.length) {
                html += `<div class="cat-uncategorized-drop" ondragover="onDropZoneDragOver(event)" ondragleave="onDropZoneDragLeave(event)" ondrop="onUncatDrop(event,'${section}')" style="min-height:20px;"></div>`;
            }
            el.innerHTML = html;
        }

        function renderTodo() {
            const el = document.getElementById('todoList');
            renderCategorizedList(el, dashboard.todoList, 'todo', 'todo', renderTaskItemHtml, 'mc_empty_todo');
        }

        function renderMission() {
            const el = document.getElementById('missionList');
            renderCategorizedList(el, dashboard.missionList, 'mission', 'mission', renderTaskItemHtml, 'mc_empty_mission');
        }

        function renderDoneItemHtml(item) {
            return `
            <div class="mc-item" draggable="true" data-item-id="${item.id}"
                 ondragstart="onItemDragStart(event,'${item.id}','done')" ondragend="onItemDragEnd(event)"
                 oncontextmenu="showItemMenu(event,'${item.id}','done')">
                <div class="item-row">
                    <span class="item-title">${esc(item.title)}</span>
                    ${item.completedAt ? `<span class="item-badge" style="color:var(--success);">${fmtDate(item.completedAt)}</span>` : ''}
                    <button class="item-delete" onclick="event.stopPropagation();deleteItem('${item.id}','done')" title="${i18n.t('common_delete')}">&times;</button>
                </div>
                ${item.description ? `<div class="item-detail">${esc(item.description)}</div>` : ''}
            </div>`;
        }

        function renderDone() {
            const el = document.getElementById('doneList');
            renderCategorizedList(el, dashboard.doneList, 'done', 'done', renderDoneItemHtml, 'mc_empty_done');
        }

        function renderNoteItemHtml(n) {
            return `
            <div class="mc-item" draggable="true" data-item-id="${n.id}"
                 ondragstart="onItemDragStart(event,'${n.id}','notes')" ondragend="onItemDragEnd(event)"
                 onclick="showEditNote('${n.id}')" oncontextmenu="showNoteMenu(event,'${n.id}')">
                <div class="item-row">
                    <span class="item-title">${esc(n.title)}</span>
                    <button class="item-delete" onclick="event.stopPropagation();deleteNote('${n.id}')" title="${i18n.t('common_delete')}">&times;</button>
                </div>
                <div class="item-detail">${esc((n.content || '').slice(0, 80))}</div>
            </div>`;
        }

        function renderNotes() {
            const el = document.getElementById('notesList');
            renderCategorizedList(el, dashboard.notes, 'notes', 'notes', renderNoteItemHtml, 'mc_empty_notes');
        }

        function renderRuleItemHtml(r) {
            const entities = (r.assignedEntities || []).map(id => getEntityLabel(parseInt(id))).join(', ');
            return `
            <div class="mc-item" draggable="true" data-item-id="${r.id}"
                 ondragstart="onItemDragStart(event,'${r.id}','rules')" ondragend="onItemDragEnd(event)"
                 onclick="showEditRule('${r.id}')" oncontextmenu="showRuleMenu(event,'${r.id}')">
                <div class="item-row">

        // ========== Dialogs ==========
        function showDialog(title, fields, onSave) {
            const c = document.getElementById('dialogContainer');
            let html = `<div class="dialog-overlay">
                <div class="dialog">
                    <div class="dialog-title">${title}</div>`;

            fields.forEach(f => {
                html += `<div class="dialog-field-label">${f.label}</div>`;
                if (f.type === 'textarea') {
                    html += `<textarea id="dlg_${f.key}" placeholder="${f.label}">${esc(f.value || '')}</textarea>`;
                } else if (f.type === 'multiselect') {
                    const selected = (f.value || '').split(',').map(s => s.trim()).filter(Boolean);
                    html += `<div id="dlg_${f.key}" class="dlg-multiselect" style="display:flex;flex-wrap:wrap;gap:6px;">
                        ${f.options.filter(o => o.value !== '').map(o => `<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:13px;">
                            <input type="checkbox" data-val="${o.value}" ${selected.includes(String(o.value)) ? 'checked' : ''}> ${o.label}
                        </label>`).join('')}
                    </div>`;
                } else if (f.type === 'select') {
                    html += `<select id="dlg_${f.key}">
                        ${f.options.map(o => `<option value="${o.value}" ${o.value == f.value ? 'selected' : ''}>${o.label}</option>`).join('')}
                    </select>`;
                } else {
                    html += `<input id="dlg_${f.key}" placeholder="${f.label}" value="${esc(f.value || '')}" />`;
                }
            });

            html += `<div class="dialog-actions">
                        <button class="btn btn-outline" onclick="closeDialog()">${i18n.t('mc_dlg_cancel')}</button>
                        <button class="btn btn-primary" id="dlgSaveBtn">${i18n.t('mc_dlg_save')}</button>
                    </div>
                </div>
            </div>`;

            c.innerHTML = html;

            document.getElementById('dlgSaveBtn').onclick = () => {
                const vals = {};
                fields.forEach(f => {
                    if (f.type === 'multiselect') {
                        const checks = document.querySelectorAll(`#dlg_${f.key} input[type="checkbox"]:checked`);
                        vals[f.key] = Array.from(checks).map(cb => cb.dataset.val).join(',');
                    } else {
                        vals[f.key] = document.getElementById('dlg_' + f.key).value;
                    }
                });
                onSave(vals);
                closeDialog();
            };

            // Focus first input
            const firstInput = c.querySelector('input, textarea');
            if (firstInput) setTimeout(() => firstInput.focus(), 50);
        }

        function closeDialog() {
            document.getElementById('dialogContainer').innerHTML = '';
        }

        // ========== TODO / Mission / Done Items ==========
        function showAddItem(list) {
            const priorityOpts = [
                { value: 1, label: i18n.t('mc_priority_low') },
                { value: 2, label: i18n.t('mc_priority_medium') },
                { value: 3, label: i18n.t('mc_priority_high') },
                { value: 4, label: i18n.t('mc_priority_urgent') }
            ];
            showDialog(i18n.t('mc_dlg_add_todo'), [
                { key: 'title', label: i18n.t('mc_dlg_title'), value: '' },
                { key: 'description', label: i18n.t('mc_dlg_desc'), type: 'textarea', value: '' },
                { key: 'priority', label: i18n.t('mc_dlg_priority'), type: 'select', value: 2, options: priorityOpts },
                { key: 'category', label: i18n.t('mc_dlg_category'), type: 'select', value: '', options: getCategoryOptions('todo') },
                { key: 'assignedEntity', label: i18n.t('mc_dlg_assign') || '指派實體', type: 'multiselect', value: '', options: getEntityOptions() }
            ], vals => {

        function showEditItem(id, list) {
            const arr = list === 'todo' ? dashboard.todoList : list === 'mission' ? dashboard.missionList : dashboard.doneList;
            const item = arr.find(i => i.id === id);
            if (!item) return;

            const priorityOpts = [
                { value: 1, label: i18n.t('mc_priority_low') },
                { value: 2, label: i18n.t('mc_priority_medium') },
                { value: 3, label: i18n.t('mc_priority_high') },
                { value: 4, label: i18n.t('mc_priority_urgent') }
            ];
            const pv = item.priority?.value || item.priority || 2;

            showDialog(i18n.t('mc_dlg_edit'), [
                { key: 'title', label: i18n.t('mc_dlg_title'), value: item.title },
                { key: 'description', label: i18n.t('mc_dlg_desc'), type: 'textarea', value: item.description },
                { key: 'priority', label: i18n.t('mc_dlg_priority'), type: 'select', value: pv, options: priorityOpts },
                { key: 'category', label: i18n.t('mc_dlg_category'), type: 'select', value: item.category || '', options: getCategoryOptions(list) },
                { key: 'assignedEntity', label: i18n.t('mc_dlg_assign') || '指派實體', type: 'multiselect', value: item.assignedBot || '', options: getEntityOptions() }
            ], vals => {

                item.title = vals.title.trim();
                item.description = vals.description.trim();

        function showItemMenu(e, id, list) {
            e.preventDefault();
            const menu = document.getElementById('contextMenu');
            let items = [];

            if (list === 'todo') {
                items.push({ label: i18n.t('mc_menu_move_mission'), fn: () => moveItem(id, 'todo', 'mission') });
                items.push({ label: i18n.t('mc_menu_mark_done'), fn: () => moveItem(id, 'todo', 'done') });
            }
            if (list === 'mission') {
                items.push({ label: i18n.t('mc_menu_mark_done'), fn: () => moveItem(id, 'mission', 'done') });
            }
            items.push({ label: i18n.t('mc_menu_delete'), fn: () => deleteItem(id, list) });

            menu.innerHTML = items.map(i => `<div class="context-menu-item">${i.label}</div>`).join('');
            menu.style.display = 'block';
            menu.style.left = Math.min(e.clientX, window.innerWidth - 180) + 'px';
            menu.style.top = Math.min(e.clientY, window.innerHeight - (items.length * 40)) + 'px';

            menu.querySelectorAll('.context-menu-item').forEach((el, idx) => {
                el.onclick = () => {
                    items[idx].fn();
                    menu.style.display = 'none';
                };
            });

            setTimeout(() => document.addEventListener('click', () => menu.style.display = 'none', { once: true }), 10);
        }

        function moveItem(id, from, to) {
            const fromArr = from === 'todo' ? dashboard.todoList : dashboard.missionList;
            const idx = fromArr.findIndex(i => i.id === id);
            if (idx < 0) return;

            const item = fromArr.splice(idx, 1)[0];
            item.updatedAt = Date.now();

            if (to === 'mission') {
                item.status = 'IN_PROGRESS';
                dashboard.missionList.push(item);
            }
            if (to === 'done') {
                item.status = 'DONE';
                item.completedAt = Date.now();
                dashboard.doneList.unshift(item);
            }

            markChanged();
            renderAll();
        }

        function deleteItem(id, list) {
            if (!confirm(i18n.t('mc_confirm_delete'))) return;

            if (list === 'todo') dashboard.todoList = dashboard.todoList.filter(i => i.id !== id);
            else if (list === 'mission') dashboard.missionList = dashboard.missionList.filter(i => i.id !== id);
            else dashboard.doneList = dashboard.doneList.filter(i => i.id !== id);

            markChanged();
            renderAll();
        }

        // ========== Skills ==========
        let skillTemplates = []; // loaded from /api/skill-templates

        let ruleTemplates = []; // loaded from /api/rule-templates

        async function loadSkillTemplates() {
            try {
                const data = await apiCall('GET', '/api/skill-templates');
                if (data.success) skillTemplates = data.templates;
            } catch (e) { console.warn('Failed to load skill templates:', e); }
        }

        async function loadSoulTemplates() {
            try {
                const data = await apiCall('GET', '/api/soul-templates');
                if (data.success) soulTemplates = data.templates;
            } catch (e) { console.warn('Failed to load soul templates:', e); }
        }

        async function loadRuleTemplates() {
            try {
                const data = await apiCall('GET', '/api/rule-templates');
                if (data.success) ruleTemplates = data.templates;
            } catch (e) { console.warn('Failed to load rule templates:', e); }
        }

        // Context saved when gallery opens so we can restore on back/cancel
        let _skillDialogCtx = { id: null, skill: null };

        function fillSkillTemplate(tpl) {
            document.getElementById('dlg_skill_title').value = tpl.title;
            document.getElementById('dlg_skill_url').value = tpl.url || '';
            document.getElementById('dlg_skill_steps').value = tpl.steps || '';
            // Update selected template indicator
            const selRow = document.getElementById('dlg_tpl_selected');
            const selLabel = document.getElementById('dlg_tpl_selected_label');
            const browseBtn = document.getElementById('dlg_browse_tpl_btn');
            if (selRow && selLabel) {
                const vars = loadLocalVars();
                const configured = tpl.requiredVars && tpl.requiredVars.length > 0 && tpl.requiredVars.every(v => vars[v.key]);
                selLabel.textContent = `${tpl.icon ? tpl.icon + ' ' : ''}${tpl.label}${configured ? ' ✓' : ''}`;
                selRow.style.display = 'flex';
            }
            if (browseBtn) browseBtn.style.display = 'none';
        }

        function applySkillTemplate(templateId) {
            const tpl = skillTemplates.find(t => t.id === templateId);
            if (!tpl) return;
            if (tpl.requiredVars && tpl.requiredVars.length > 0) {
                showRequiredVarsDialog(tpl);
                return;
            }
            fillSkillTemplate(tpl);
        }

        function showTemplateGallery() {
            _skillDialogCtx = { id: _skillDialogCtx.id, skill: _skillDialogCtx.skill };
            const c = document.getElementById('dialogContainer');
            c.innerHTML = buildGalleryHtml(skillTemplates);
            document.getElementById('tpl_gallery_search').focus();
        }

        function buildGalleryHtml(templates) {
            const vars = loadLocalVars();
            const cards = templates.map(t => {
                let statusHtml = '';
                if (t.requiredVars && t.requiredVars.length > 0) {
                    const allSet = t.requiredVars.every(v => vars[v.key]);
                    if (allSet) {
                        statusHtml = `<div class="tpl-gallery-status ok">✓ All vars configured</div>`;
                    } else {
                        const missing = t.requiredVars.filter(v => !vars[v.key]).map(v => v.key).join(', ');
                        statusHtml = `<div class="tpl-gallery-status warn">⚠ Needs: ${esc(missing)}</div>`;
                    }
                } else {
                    statusHtml = `<div class="tpl-gallery-status" style="color:var(--text-muted);">No API key needed</div>`;
                }
                return `<div class="tpl-gallery-card" data-id="${esc(t.id)}" data-label="${esc(t.label)}" data-title="${esc(t.title || '')}" data-author="${esc(t.author || '')}" onclick="selectTemplateFromGallery('${esc(t.id)}')">
                    <div class="tpl-gallery-icon">${t.icon || '📦'}</div>
                    <div class="tpl-gallery-info">
                        <div class="tpl-gallery-title">${esc(t.label)}</div>
                        <div class="tpl-gallery-meta">by ${esc(t.author || '—')} · ${esc(t.updatedAt || '')}</div>
                        ${statusHtml}
                    </div>
                    <button class="btn btn-outline" style="font-size:12px;padding:5px 12px;flex-shrink:0;" onclick="event.stopPropagation();selectTemplateFromGallery('${esc(t.id)}')">Select</button>
                </div>`;
            }).join('');

            return `<div class="dialog-overlay" onclick="if(event.target===this)_restoreSkillDialog()">
                <div class="dialog" style="max-width:480px;">
                    <div class="dialog-title">${esc(i18n.t('mc_browse_official_tpl'))} (${templates.length})</div>
                    <input id="tpl_gallery_search" type="text" placeholder="${esc(i18n.t('mc_search_placeholder') || 'Search...')}" oninput="filterGallery(this.value)" style="margin-bottom:12px;" />
                    <div id="tpl_gallery_list" style="max-height:380px;overflow-y:auto;">${cards}</div>
                    <div class="dialog-actions">
                        <button class="btn btn-outline" onclick="_restoreSkillDialog()">${esc(i18n.t('mc_dlg_cancel'))}</button>
                    </div>
                </div>
            </div>`;
        }

        function filterGallery(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('#tpl_gallery_list .tpl-gallery-card').forEach(card => {
                const label = (card.dataset.label || '').toLowerCase();
                const title = (card.dataset.title || '').toLowerCase();
                const author = (card.dataset.author || '').toLowerCase();
                card.style.display = (label.includes(q) || title.includes(q) || author.includes(q)) ? '' : 'none';
            });
        }

        function selectTemplateFromGallery(tplId) {
            _restoreSkillDialog();
            applySkillTemplate(tplId);
        }

        function _restoreSkillDialog() {
            showSkillDialog(_skillDialogCtx.id, _skillDialogCtx.skill);
        }

        // ========== Soul Gallery ==========
        function showSoulGallery() {
            // Prevent duplicate overlays from spam-clicking
            if (document.getElementById('soul_gallery_overlay')) return;
            // Section A: built-in SOUL_TEMPLATES
            const builtinCards = SOUL_TEMPLATES.map(t => {
                const name = getSoulTemplateName(t);
                const desc = getSoulTemplateDesc(t);
                return `<div class="tpl-gallery-card" data-id="${esc(t.id)}" data-label="${esc(name)}" data-source="builtin" onclick="selectBuiltinSoulTemplate('${esc(t.id)}')">
                    <div class="tpl-gallery-icon">${t.icon || '🧠'}</div>
                    <div class="tpl-gallery-info">
                        <div class="tpl-gallery-title">${esc(name)}</div>
                        <div class="tpl-gallery-meta">${esc(i18n.t('mc_dlg_soul_gallery_builtin'))}</div>
                        <div class="tpl-gallery-status" style="color:var(--text-muted);">${esc(desc.substring(0, 60))}…</div>
                    </div>
                    <button class="btn btn-outline" style="font-size:12px;padding:5px 12px;flex-shrink:0;" onclick="event.stopPropagation();selectBuiltinSoulTemplate('${esc(t.id)}')">Select</button>
                </div>`;
            }).join('');

            // Section B: community soulTemplates from API
            const communityCards = soulTemplates.map(t =>
                `<div class="tpl-gallery-card" data-id="${esc(t.id)}" data-label="${esc(t.label)}" data-author="${esc(t.author || '')}" data-source="custom" onclick="selectCustomSoulTemplate('${esc(t.id)}')">
                    <div class="tpl-gallery-icon">${esc(t.icon) || '🧠'}</div>
                    <div class="tpl-gallery-info">
                        <div class="tpl-gallery-title">${esc(t.label)}</div>
                        <div class="tpl-gallery-meta">by ${esc(t.author || '—')} · ${esc(t.updatedAt || '')}</div>
                        <div class="tpl-gallery-status" style="color:var(--text-muted);">${esc((t.description || '').substring(0, 60))}…</div>

                </div>`
            ).join('');

            const communitySectionHtml = communityCards ? `
                <div class="tpl-gallery-section-label" style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;padding:8px 0 4px;">${esc(i18n.t('mc_dlg_soul_gallery_community'))}</div>

                <div class="tpl-gallery-section-label" style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;padding:4px 0 4px;">${esc(i18n.t('mc_dlg_soul_gallery_builtin'))}</div>
                ${builtinCards}
                ${communitySectionHtml}`;

            document.body.insertAdjacentHTML('beforeend',
                `<div id="soul_gallery_overlay" class="dialog-overlay" onclick="if(event.target===this)document.getElementById('soul_gallery_overlay').remove()">
                    <div class="dialog" style="max-width:480px;">
                        <div class="dialog-title">${esc(i18n.t('mc_dlg_soul_template'))} (${SOUL_TEMPLATES.length + soulTemplates.length})</div>
                        <input type="text" placeholder="${esc(i18n.t('mc_search_placeholder') || '搜尋…')}" oninput="filterSoulGallery(this.value)" style="margin-bottom:12px;" />
                        <div id="soul_gallery_list" style="max-height:380px;overflow-y:auto;">${allCards}</div>
                        <div class="dialog-actions">
                            <button class="btn btn-outline" onclick="document.getElementById('soul_gallery_overlay').remove()">${esc(i18n.t('mc_dlg_cancel'))}</button>
                        </div>
                    </div>
                </div>`
            );
        }

        function filterSoulGallery(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('#soul_gallery_list .tpl-gallery-card').forEach(card => {
                const label = (card.dataset.label || '').toLowerCase();
                const author = (card.dataset.author || '').toLowerCase();
                card.style.display = (label.includes(q) || author.includes(q)) ? '' : 'none';
            });
            // Show/hide section labels based on visible cards
            document.querySelectorAll('#soul_gallery_list .tpl-gallery-section-label').forEach(label => {
                let sibling = label.nextElementSibling;
                let anyVisible = false;
                while (sibling && !sibling.classList.contains('tpl-gallery-section-label')) {
                    if (sibling.classList.contains('tpl-gallery-card') && sibling.style.display !== 'none') {
                        anyVisible = true; break;
                    }
                    sibling = sibling.nextElementSibling;
                }
                label.style.display = anyVisible ? '' : 'none';
            });
        }

        function selectBuiltinSoulTemplate(id) {
            const tpl = SOUL_TEMPLATES.find(t => t.id === id);

            const descEl = document.getElementById('dlg_soul_desc');

            const btnEl = document.getElementById('dlgTemplateBtn');
            if (nameEl) nameEl.value = getSoulTemplateName(tpl);
            if (descEl) descEl.value = getSoulTemplateDesc(tpl);
            if (tplIdEl) tplIdEl.value = id;
            if (btnEl) btnEl.textContent = `🎭 ${getSoulTemplateName(tpl)}`;
            document.getElementById('soul_gallery_overlay')?.remove();
        }

        function selectCustomSoulTemplate(id) {
            const tpl = soulTemplates.find(t => t.id === id);
            if (!tpl) return;
            const nameEl = document.getElementById('dlg_soul_name');
            const descEl = document.getElementById('dlg_soul_desc');
            const tplIdEl = document.getElementById('dlg_soul_template_id');
            const btnEl = document.getElementById('dlgTemplateBtn');
            if (nameEl) nameEl.value = tpl.name || tpl.label || '';
            if (descEl) descEl.value = tpl.description || '';
            if (tplIdEl) tplIdEl.value = '';
            if (btnEl) btnEl.textContent = `🎭 ${esc(tpl.label || tpl.name || '')}`;
            document.getElementById('soul_gallery_overlay')?.remove();
        }

        // ========== Rule Gallery ==========

            const descEl = document.getElementById('dlg_rule_desc');

        function showRuleGallery() {
            // Prevent duplicate overlays from spam-clicking

        // ========== Variables (local .env vault) ==========
        const VARS_STORAGE_KEY = () => `eclawLocalVars_${currentUser?.deviceId || 'default'}`;

        function loadLocalVars() {
            try { return JSON.parse(localStorage.getItem(VARS_STORAGE_KEY()) || '{}'); }
            catch { return {}; }
        }

        function saveLocalVar(key, value) {
            const vars = loadLocalVars();
            vars[key] = value;
            localStorage.setItem(VARS_STORAGE_KEY(), JSON.stringify(vars));
            syncVarsToServer();
        }

        // Background sync only — UI lives in env-vars.html
        async function syncVarsToServer() {
            if (!currentUser) return;
            const locked = localStorage.getItem(`eclawVarsLocked_${currentUser.deviceId}`) === 'true';
            const vars = loadLocalVars();
            try {
                const result = await apiCall('POST', '/api/device-vars', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    vars,
                    locked,
                    source: 'web'
                });
                if (result && result.mergedVars) {
                    localStorage.setItem(VARS_STORAGE_KEY(), JSON.stringify(result.mergedVars));
                }
            } catch (e) { /* silent */ }
        }
