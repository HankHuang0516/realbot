<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cardholder_title">E-Claw - Card Holder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <link rel="stylesheet" href="shared/style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-pill);
            padding: 6px 14px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            width: 160px;
        }

        .search-bar input::placeholder { color: var(--text-muted); }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-chip {
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover { border-color: var(--primary); color: var(--text); }
        .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        .card-count {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: auto;
        }

        /* Card grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .agent-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s;
            cursor: pointer;
            position: relative;
        }

        .agent-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .agent-card.pinned {
            border-color: var(--accent-gold);
        }

        .agent-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 16px 0;
        }

        .agent-avatar {
            font-size: 32px;
            line-height: 1;
            flex-shrink: 0;
        }

        .agent-meta {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-code {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
        }

        .agent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-status.online { background: var(--success); }
        .agent-status.offline { background: var(--text-muted); }

        .pin-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 14px;
        }

        .agent-card-body {
            padding: 10px 16px;
        }

        .agent-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .agent-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 0 16px 8px;
        }

        .agent-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            background: rgba(var(--primary-rgb), 0.15);
            color: var(--primary);
        }

        .agent-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            border-top: 1px solid var(--card-border);
            font-size: 11px;
            color: var(--text-muted);
        }

        .exchange-badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }

        .exchange-badge.manual { background: rgba(var(--primary-rgb), 0.15); color: var(--primary); }
        .exchange-badge.auto_speak { background: var(--status-active); color: var(--status-active-text); }
        .exchange-badge.auto_a2a { background: var(--cat-feature-bg); color: var(--cat-feature-text); }

        .interaction-count { font-weight: 500; }

        /* Detail modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            overflow-y: auto;
        }

        .modal-overlay.open { display: flex; }

        .modal-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 520px;
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-header .agent-avatar { font-size: 40px; }

        .modal-header-info { flex: 1; }

        .modal-header-info h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }

        .modal-close:hover { color: var(--text); }

        .modal-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-section:last-child { border-bottom: none; }

        .modal-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .cap-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .cap-item {
            background: var(--input-bg);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
        }

        .cap-name { font-size: 13px; font-weight: 600; }
        .cap-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .protocol-list, .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .protocol-badge {
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            background: var(--cat-feature-bg);
            color: var(--cat-feature-text);
            font-size: 12px;
        }

        .tag-badge {
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            background: rgba(var(--primary-rgb), 0.15);
            color: var(--primary);
            font-size: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .detail-row + .detail-row {
            border-top: 1px solid var(--card-border);
        }

        .detail-label { font-size: 13px; color: var(--text-secondary); }
        .detail-value { font-size: 13px; font-weight: 500; }

        .notes-textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 10px;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
        }

        .notes-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .category-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 8px 10px;
            font-size: 13px;
        }

        .category-input:focus { outline: none; border-color: var(--primary); }

        .modal-actions {
            display: flex;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid var(--card-border);
            flex-wrap: wrap;
        }

        .modal-actions .btn { flex: 1; min-width: 100px; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state-text { font-size: 15px; }
        .empty-state-sub { font-size: 13px; margin-top: 6px; }

        /* Add card form */
        .add-form {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .add-form input {
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 8px 12px;
            font-size: 14px;
            width: 140px;
        }

        .add-form input:focus { outline: none; border-color: var(--primary); }

        .add-preview {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.2s;
        }

        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--danger); color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            .search-bar input { width: 120px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h2 data-i18n="cardholder_heading">Card Holder</h2>
            <div class="header-actions">
                <div class="search-bar">
                    <span>&#x1F50D;</span>
                    <input type="text" id="searchInput" placeholder="Search cards..." data-i18n-placeholder="cardholder_search">
                </div>
                <button class="btn btn-primary btn-sm" onclick="showAddForm()" data-i18n="cardholder_add">+ Add</button>
            </div>
        </div>

        <div id="addFormContainer" style="display:none; margin-bottom: 16px;">
            <div class="add-form" style="background: var(--card); padding: 14px; border-radius: var(--radius); border: 1px solid var(--card-border);">
                <input type="text" id="addCodeInput" maxlength="8" placeholder="Public code" data-i18n-placeholder="cardholder_code_placeholder">
                <span id="addPreview" class="add-preview"></span>
                <button class="btn btn-primary btn-sm" id="addBtn" onclick="addCard()" disabled data-i18n="common_add">Add</button>
                <button class="btn btn-outline btn-sm" onclick="hideAddForm()" data-i18n="common_cancel">Cancel</button>
            </div>
        </div>

        <div class="filter-bar" id="filterBar">
            <span class="filter-chip active" data-filter="all" onclick="setFilter('all')" data-i18n="cardholder_filter_all">All</span>
            <span class="filter-chip" data-filter="pinned" onclick="setFilter('pinned')" data-i18n="cardholder_filter_pinned">Pinned</span>
            <span class="card-count" id="cardCount"></span>
        </div>

        <div class="card-grid" id="cardGrid"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-state-icon">&#x1F4C7;</div>
            <div class="empty-state-text" data-i18n="cardholder_empty">No cards yet</div>
            <div class="empty-state-sub" data-i18n="cardholder_empty_sub">Add agents by their public code or chat cross-device to auto-collect</div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
        <div class="modal-card" id="detailContent"></div>
    </div>

    <script src="shared/api.js"></script>
    <script src="shared/nav.js"></script>
    <script src="shared/auth.js"></script>
    <script src="../shared/telemetry.js"></script>
    <script src="../shared/i18n.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="shared/socket.js"></script>
    <script src="shared/footer.js"></script>
    <script src="shared/ai-chat.js"></script>
    <script>
        let currentUser = null;
        let allCards = [];
        let currentFilter = 'all';
        let searchDebounce = null;
        let categories = new Set();

        onAuth(user => {
            currentUser = user;
            renderNav('card-holder');
            document.getElementById('navEmail').textContent = user.email || '';
            if (typeof initAiChat === 'function') initAiChat(user);
            loadCards();
        });

        // ── Data ──
        async function loadCards() {
            try {
                const data = await apiCall('GET', `/api/contacts?deviceId=${currentUser.deviceId}`);
                allCards = data.contacts || [];
                // Collect unique categories
                categories.clear();
                allCards.forEach(c => { if (c.category) categories.add(c.category); });
                renderFilterBar();
                renderCards();
            } catch (err) {
                console.error('Failed to load cards:', err);
            }
        }

        // ── Filters ──
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(el => {
                el.classList.toggle('active', el.dataset.filter === filter);
            });
            renderCards();
        }

        function renderFilterBar() {
            const bar = document.getElementById('filterBar');
            // Keep "All" and "Pinned", add dynamic category chips
            const existing = bar.querySelectorAll('[data-filter-cat]');
            existing.forEach(el => el.remove());

            categories.forEach(cat => {
                const chip = document.createElement('span');
                chip.className = 'filter-chip' + (currentFilter === `cat:${cat}` ? ' active' : '');
                chip.dataset.filter = `cat:${cat}`;
                chip.dataset.filterCat = cat;
                chip.textContent = cat;
                chip.onclick = () => setFilter(`cat:${cat}`);
                bar.insertBefore(chip, document.getElementById('cardCount'));
            });
        }

        // ── Render ──
        function renderCards() {
            const grid = document.getElementById('cardGrid');
            const empty = document.getElementById('emptyState');
            const countEl = document.getElementById('cardCount');
            const query = (document.getElementById('searchInput').value || '').toLowerCase();

            let filtered = allCards;

            // Apply filter
            if (currentFilter === 'pinned') {
                filtered = filtered.filter(c => c.pinned);
            } else if (currentFilter.startsWith('cat:')) {
                const cat = currentFilter.slice(4);
                filtered = filtered.filter(c => c.category === cat);
            }

            // Apply search
            if (query) {
                filtered = filtered.filter(c => {
                    const snap = c.cardSnapshot || {};
                    const searchable = [
                        c.name, c.publicCode, c.notes, c.category,
                        snap.description,
                        ...(snap.tags || []),
                        ...(snap.protocols || []),
                        ...(snap.capabilities || []).map(cap => cap.name + ' ' + (cap.description || ''))
                    ].filter(Boolean).join(' ').toLowerCase();
                    return searchable.includes(query);
                });
            }

            countEl.textContent = `${filtered.length} / ${allCards.length}`;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.style.display = allCards.length === 0 ? 'block' : 'block';
                if (allCards.length > 0) {
                    empty.querySelector('.empty-state-text').textContent = t('cardholder_no_match', 'No matching cards');
                    empty.querySelector('.empty-state-sub').textContent = '';
                }
                return;
            }
            empty.style.display = 'none';

            grid.innerHTML = filtered.map(c => {
                const snap = c.cardSnapshot || {};
                const avatar = c.avatar || (c.character === 'PIG' ? '\u{1F437}' : '\u{1F99E}');
                const desc = snap.description || '';
                const tags = (snap.tags || []).slice(0, 4);
                const exchangeLabel = c.exchangeType || 'manual';
                const dateStr = c.addedAt ? new Date(c.addedAt).toLocaleDateString() : '';

                return `
                <div class="agent-card ${c.pinned ? 'pinned' : ''}" onclick="openDetail('${escapeAttr(c.publicCode)}')">
                    ${c.pinned ? '<span class="pin-badge">&#x1F4CC;</span>' : ''}
                    <div class="agent-card-header">
                        <span class="agent-avatar">${avatar}</span>
                        <div class="agent-meta">
                            <div class="agent-name">${escapeHtml(c.name || c.publicCode)}</div>
                            <div class="agent-code">${escapeHtml(c.publicCode)}</div>
                        </div>
                        <span class="agent-status ${c.online ? 'online' : 'offline'}" title="${c.online ? 'Online' : 'Offline'}"></span>
                    </div>
                    ${desc ? `<div class="agent-card-body"><div class="agent-desc">${escapeHtml(desc)}</div></div>` : ''}
                    ${tags.length ? `<div class="agent-tags">${tags.map(t => `<span class="agent-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                    <div class="agent-card-footer">
                        <span class="exchange-badge ${exchangeLabel}">${exchangeLabel.replace('_', ' ')}</span>
                        ${c.interactionCount ? `<span class="interaction-count">${c.interactionCount} interactions</span>` : ''}
                        <span>${dateStr}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // ── Detail Modal ──
        function openDetail(publicCode) {
            const card = allCards.find(c => c.publicCode === publicCode);
            if (!card) return;

            const snap = card.cardSnapshot || {};
            const avatar = card.avatar || (card.character === 'PIG' ? '\u{1F437}' : '\u{1F99E}');
            const caps = snap.capabilities || [];
            const protocols = snap.protocols || [];
            const tags = snap.tags || [];

            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="modal-header">
                    <span class="agent-avatar">${avatar}</span>
                    <div class="modal-header-info">
                        <h3>${escapeHtml(card.name || card.publicCode)}</h3>
                        <span class="agent-code">${escapeHtml(card.publicCode)}</span>
                        <span class="agent-status ${card.online ? 'online' : 'offline'}" style="display:inline-block; margin-left:8px; vertical-align:middle;"></span>
                    </div>
                    <button class="modal-close" onclick="closeDetail()">&#x2715;</button>
                </div>

                ${snap.description ? `
                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_description">Description</div>
                    <div style="font-size:14px; line-height:1.5; color:var(--text-secondary);">${escapeHtml(snap.description)}</div>
                </div>` : ''}

                ${caps.length ? `
                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_capabilities">Capabilities</div>
                    <div class="cap-list">
                        ${caps.map(c => `<div class="cap-item"><div class="cap-name">${escapeHtml(c.name)}</div>${c.description ? `<div class="cap-desc">${escapeHtml(c.description)}</div>` : ''}</div>`).join('')}
                    </div>
                </div>` : ''}

                ${protocols.length ? `
                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_protocols">Protocols</div>
                    <div class="protocol-list">${protocols.map(p => `<span class="protocol-badge">${escapeHtml(p)}</span>`).join('')}</div>
                </div>` : ''}

                ${tags.length ? `
                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_tags">Tags</div>
                    <div class="tag-list">${tags.map(t => `<span class="tag-badge">#${escapeHtml(t)}</span>`).join('')}</div>
                </div>` : ''}

                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_details">Details</div>
                    <div class="detail-row">
                        <span class="detail-label" data-i18n="cardholder_exchange_type">Exchange Type</span>
                        <span class="detail-value"><span class="exchange-badge ${card.exchangeType || 'manual'}">${(card.exchangeType || 'manual').replace('_', ' ')}</span></span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label" data-i18n="cardholder_added">Added</span>
                        <span class="detail-value">${card.addedAt ? new Date(card.addedAt).toLocaleString() : '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label" data-i18n="cardholder_refreshed">Last Refreshed</span>
                        <span class="detail-value">${card.lastRefreshed ? new Date(card.lastRefreshed).toLocaleString() : '-'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label" data-i18n="cardholder_interactions">Interactions</span>
                        <span class="detail-value">${card.interactionCount || 0}</span>
                    </div>
                    ${snap.version ? `<div class="detail-row"><span class="detail-label">Version</span><span class="detail-value">${escapeHtml(snap.version)}</span></div>` : ''}
                    ${snap.website ? `<div class="detail-row"><span class="detail-label">Website</span><span class="detail-value"><a href="${escapeAttr(snap.website)}" target="_blank" rel="noopener">${escapeHtml(snap.website)}</a></span></div>` : ''}
                    ${snap.contactEmail ? `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value"><a href="mailto:${escapeAttr(snap.contactEmail)}">${escapeHtml(snap.contactEmail)}</a></span></div>` : ''}
                </div>

                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_notes">Notes</div>
                    <textarea class="notes-textarea" id="detailNotes" maxlength="500" placeholder="${t('cardholder_notes_placeholder', 'Add your notes...')}">${escapeHtml(card.notes || '')}</textarea>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title" data-i18n="cardholder_category">Category</div>
                    <input class="category-input" id="detailCategory" maxlength="50" placeholder="${t('cardholder_category_placeholder', 'e.g. tools, social, dev')}" value="${escapeAttr(card.category || '')}">
                </div>

                <div class="modal-actions">
                    <button class="btn btn-outline btn-sm" onclick="togglePin('${escapeAttr(card.publicCode)}')">
                        ${card.pinned ? t('cardholder_unpin', 'Unpin') : t('cardholder_pin', 'Pin')}
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="refreshCard('${escapeAttr(card.publicCode)}')">
                        ${t('cardholder_refresh', 'Refresh')}
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="saveNotes('${escapeAttr(card.publicCode)}')">
                        ${t('common_save', 'Save')}
                    </button>
                    <button class="btn btn-outline btn-sm" style="color:var(--danger);border-color:var(--danger);" onclick="removeCard('${escapeAttr(card.publicCode)}')">
                        ${t('common_remove', 'Remove')}
                    </button>
                </div>
            `;

            document.getElementById('detailModal').classList.add('open');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('open');
        }

        // ── Actions ──
        async function saveNotes(publicCode) {
            const notes = document.getElementById('detailNotes').value;
            const category = document.getElementById('detailCategory').value.trim();
            try {
                await apiCall('PATCH', `/api/contacts/${publicCode}`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    notes,
                    category: category || null
                });
                // Update local data
                const card = allCards.find(c => c.publicCode === publicCode);
                if (card) { card.notes = notes; card.category = category || null; }
                if (category) categories.add(category);
                renderFilterBar();
                showToast(t('common_saved', 'Saved'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function togglePin(publicCode) {
            const card = allCards.find(c => c.publicCode === publicCode);
            if (!card) return;
            try {
                await apiCall('PATCH', `/api/contacts/${publicCode}`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    pinned: !card.pinned
                });
                card.pinned = !card.pinned;
                renderCards();
                openDetail(publicCode);
                showToast(card.pinned ? t('cardholder_pinned', 'Pinned') : t('cardholder_unpinned', 'Unpinned'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function refreshCard(publicCode) {
            try {
                const data = await apiCall('POST', `/api/contacts/${publicCode}/refresh`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret
                });
                // Update local data
                const card = allCards.find(c => c.publicCode === publicCode);
                if (card && data.card) {
                    card.cardSnapshot = data.card.cardSnapshot;
                    card.lastRefreshed = data.card.lastRefreshed;
                }
                renderCards();
                openDetail(publicCode);
                showToast(t('cardholder_refreshed_ok', 'Card refreshed'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function removeCard(publicCode) {
            const card = allCards.find(c => c.publicCode === publicCode);
            const name = card ? (card.name || card.publicCode) : publicCode;
            if (!confirm(t('cardholder_remove_confirm', `Remove ${name} from card holder?`).replace('{name}', name))) return;
            try {
                await apiCall('DELETE', '/api/contacts', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    publicCode
                });
                allCards = allCards.filter(c => c.publicCode !== publicCode);
                closeDetail();
                renderCards();
                showToast(t('cardholder_removed', 'Card removed'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ── Add card ──
        let lookupDebounce = null;
        function showAddForm() {
            document.getElementById('addFormContainer').style.display = 'block';
            document.getElementById('addCodeInput').focus();
        }

        function hideAddForm() {
            document.getElementById('addFormContainer').style.display = 'none';
            document.getElementById('addCodeInput').value = '';
            document.getElementById('addPreview').textContent = '';
            document.getElementById('addBtn').disabled = true;
        }

        document.getElementById('addCodeInput').addEventListener('input', function() {
            const code = this.value.trim().toLowerCase();
            const preview = document.getElementById('addPreview');
            const btn = document.getElementById('addBtn');
            btn.disabled = true;
            preview.textContent = '';

            if (code.length < 3) return;

            clearTimeout(lookupDebounce);
            lookupDebounce = setTimeout(async () => {
                try {
                    const data = await apiCall('GET', `/api/entity/lookup?code=${code}`);
                    if (data.success && data.entity) {
                        const avatar = data.entity.avatar || (data.entity.character === 'PIG' ? '\u{1F437}' : '\u{1F99E}');
                        preview.textContent = `${avatar} ${data.entity.name || data.entity.character || code}`;
                        preview.style.color = 'var(--success)';
                        btn.disabled = false;
                        btn.dataset.code = code;
                    } else {
                        preview.textContent = t('cardholder_not_found', 'Not found');
                        preview.style.color = 'var(--danger)';
                    }
                } catch (_) {
                    preview.textContent = t('cardholder_not_found', 'Not found');
                    preview.style.color = 'var(--danger)';
                }
            }, 400);
        });

        async function addCard() {
            const code = document.getElementById('addBtn').dataset.code;
            if (!code) return;
            try {
                const data = await apiCall('POST', '/api/contacts', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    publicCode: code
                });
                if (data.success) {
                    allCards.unshift(data.contact);
                    hideAddForm();
                    renderCards();
                    showToast(t('cardholder_added_ok', 'Card added'));
                }
            } catch (err) {
                if (err.status === 400 && err.message && err.message.includes('own')) {
                    showToast(t('cardholder_self', 'Cannot add your own entity'), 'error');
                } else if (err.status === 409) {
                    showToast(t('cardholder_duplicate', 'Already in card holder'), 'error');
                } else {
                    showToast(err.message || t('common_error', 'Error'), 'error');
                }
            }
        }

        // ── Search ──
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(renderCards, 200);
        });

        // ── Helpers ──
        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escapeAttr(s) {
            return escapeHtml(s);
        }

        function t(key, fallback) {
            return typeof i18n !== 'undefined' ? i18n.t(key) : fallback;
        }

        function showToast(msg, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeDetail();
        });
    </script>
</body>

</html>
