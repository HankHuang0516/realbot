<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="cardholder_title">E-Claw - Card Holder</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
    <link rel="stylesheet" href="shared/style.css">
    <style>
        /* ── Toolbar ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ── Search bar ── */
        .search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-pill);
            padding: 6px 14px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 14px;
            width: 180px;
        }

        .search-bar input::placeholder { color: var(--text-muted); }

        /* ── Filter chips ── */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-chip {
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip:hover { border-color: var(--primary); color: var(--text); }
        .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* ── Section headers ── */
        .section-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 0 8px;
        }

        /* ── Card shared styles ── */
        .card-item {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 8px;
            transition: border-color 0.2s, transform 0.15s;
            cursor: pointer;
        }

        .card-item:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .card-item.pinned { border-color: var(--accent-gold); }
        .card-item.blocked { opacity: 0.5; border-color: var(--danger); }

        .card-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .agent-avatar {
            font-size: 32px;
            line-height: 1;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--input-bg);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-meta {
            flex: 1;
            min-width: 0;
        }

        .agent-name {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-code {
            display: inline-block;
            font-size: 11px;
            color: var(--primary);
            font-family: monospace;
            background: rgba(var(--primary-rgb), 0.1);
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        .agent-code:hover { background: rgba(var(--primary-rgb), 0.25); }

        .agent-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .agent-status.online { background: var(--success); }
        .agent-status.offline { background: var(--text-muted); }

        .card-info-line {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Action buttons on Recent items ── */
        .card-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .card-action-btn {
            background: none;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .card-action-btn.add-friend:hover { border-color: var(--success); color: var(--success); }
        .card-action-btn.block-btn:hover { border-color: var(--danger); color: var(--danger); }
        .card-action-btn.block-btn.blocked { border-color: var(--danger); color: var(--danger); }

        /* ── Agent Card edit (dashboard-style) ── */
        .ac-caps-list { margin: 8px 0; }
        .ac-cap-item {
            display: flex;
            gap: 6px;
            align-items: flex-start;
            margin-bottom: 8px;
            padding: 8px;
            background: var(--input-bg);
            border-radius: 6px;
            border: 1px solid var(--card-border);
        }
        .ac-cap-item input { flex: 1; min-width: 0; }
        .ac-cap-remove {
            background: none; border: none; color: var(--danger);
            cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
        }

        .ac-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }
        .ac-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 3px 10px;
            font-size: 12px;
            color: var(--text);
        }
        .ac-tag-remove {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; font-size: 14px; padding: 0; line-height: 1;
        }
        .ac-tag-input {
            display: flex; gap: 6px; margin-top: 6px;
        }
        .ac-tag-input input { flex: 1; }
        .ac-tag-input button { flex-shrink: 0; }

        .edit-field {
            margin-bottom: 6px;
        }

        .edit-field label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .edit-field input, .edit-field textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            color: var(--text);
            padding: 6px 10px;
            font-size: 13px;
            box-sizing: border-box;
        }

        .edit-field input:focus, .edit-field textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .edit-save-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
        }

        .edit-save-btn:hover { background: var(--primary-hover); }

        /* ── External card (search results) ── */
        .add-card-btn {
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
        }

        .add-card-btn:hover { text-decoration: underline; }

        /* ── Detail modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            overflow-y: auto;
        }

        .modal-overlay.open { display: flex; }

        .modal-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 560px;
            animation: slideUp 0.2s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-header .agent-avatar { font-size: 40px; width: 56px; height: 56px; }

        .modal-header-info { flex: 1; }

        .modal-header-info h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }

        .modal-close:hover { color: var(--text); }

        /* Modal tabs (Details / Chat History) */
        .modal-tabs {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-tab {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            background: var(--input-bg);
            color: var(--text-secondary);
            border: none;
            transition: all 0.2s;
        }

        .modal-tab.active {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
        }

        .modal-panel { display: none; }
        .modal-panel.active { display: block; }

        .modal-section {
            padding: 16px 20px;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-section:last-child { border-bottom: none; }

        .modal-section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .cap-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .cap-item {
            background: var(--input-bg);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
        }

        .cap-name { font-size: 13px; font-weight: 600; }
        .cap-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .protocol-list, .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .protocol-badge {
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            background: var(--cat-feature-bg);
            color: var(--cat-feature-text);
            font-size: 12px;
        }

        .tag-badge {
            padding: 3px 10px;
            border-radius: var(--radius-pill);
            background: rgba(var(--primary-rgb), 0.15);
            color: var(--primary);
            font-size: 12px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }

        .detail-row + .detail-row {
            border-top: 1px solid var(--card-border);
        }

        .detail-label { font-size: 13px; color: var(--text-secondary); }
        .detail-value { font-size: 13px; font-weight: 500; }

        /* Chat history in modal */
        .chat-history-list {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-msg {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            line-height: 1.4;
            max-width: 85%;
        }

        .chat-msg.sent {
            background: rgba(26, 42, 26, 0.8);
            align-self: flex-end;
        }

        .chat-msg.received {
            background: var(--input-bg);
            align-self: flex-start;
        }

        .chat-msg .chat-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
            text-align: right;
        }

        .chat-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            padding: 16px 20px;
            border-top: 1px solid var(--card-border);
            flex-wrap: wrap;
        }

        .modal-actions .btn { flex: 1; min-width: 80px; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state-text { font-size: 15px; }

        /* Search results sections */
        .search-results-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin: 16px 0 8px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            z-index: 2000;
            animation: fadeIn 0.2s;
        }

        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--danger); color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            .search-bar input { width: 120px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Toolbar -->
        <div class="page-header">
            <h2 data-i18n="cardholder_heading">Card Holder</h2>
            <div class="header-actions">
                <div class="search-bar">
                    <span>&#x1F50D;</span>
                    <input type="text" id="searchInput" placeholder="Search cards..." data-i18n-placeholder="cardholder_search">
                </div>
            </div>
        </div>

        <!-- Filter chips -->
        <div class="filter-bar" id="filterBar">
            <span class="filter-chip active" data-filter="all" onclick="setFilter('all')" data-i18n="cardholder_filter_all">All</span>
            <span class="filter-chip" data-filter="friends" onclick="setFilter('friends')" data-i18n="cardholder_filter_friends">Friends</span>
            <span class="filter-chip" data-filter="pinned" onclick="setFilter('pinned')" data-i18n="cardholder_filter_pinned">Pinned</span>
        </div>

        <!-- Main scrollable content (3 sections) -->
        <div id="mainContent"></div>

        <!-- Search results (shown when searching) -->
        <div id="searchResults" style="display:none;"></div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeDetail()">
        <div class="modal-card" id="detailContent"></div>
    </div>

    <script src="shared/api.js"></script>
    <script src="shared/nav.js"></script>
    <script src="shared/auth.js"></script>
    <script src="shared/entity-utils.js"></script>
    <script>if(typeof renderAvatarHtml==='undefined'){window.renderAvatarHtml=function(a){return a||'\u{1F99E}'};window.isAvatarUrl=function(){return false}}</script>
    <script src="../shared/telemetry.js"></script>
    <script src="../shared/i18n.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="shared/socket.js"></script>
    <script src="shared/footer.js"></script>
    <script src="shared/ai-chat.js"></script>
    <script>
        // ── State ──
        let myCards = [];
        let recentCards = [];
        let collectedCards = [];
        let currentFilter = 'all';
        let isSearching = false;
        let searchSaved = [];
        let searchExternal = [];
        let searchDebounce = null;

        // ── Init ──
        window.addEventListener('DOMContentLoaded', async () => {
            renderNav('card-holder');
            if (typeof renderFooter === 'function') renderFooter();
            const user = await checkAuth();
            if (!user) return;
            document.getElementById('navEmail').textContent = user.email || '';
            if (typeof initAiChat === 'function') initAiChat(user);
            loadAllData();
        });

        // ── Data loading ──
        async function loadAllData() {
            await Promise.all([loadMyCards(), loadRecent(), loadCollected()]);
            rebuildContent();
        }

        async function loadMyCards() {
            try {
                const data = await apiCall('GET', `/api/contacts/my-cards?deviceId=${currentUser.deviceId}&deviceSecret=${currentUser.deviceSecret}`);
                myCards = data.cards || [];
            } catch (err) {
                console.error('Failed to load my cards:', err);
            }
        }

        async function loadRecent() {
            try {
                const data = await apiCall('GET', `/api/contacts/recent?deviceId=${currentUser.deviceId}&deviceSecret=${currentUser.deviceSecret}&limit=20`);
                recentCards = data.contacts || [];
            } catch (err) {
                console.error('Failed to load recent:', err);
            }
        }

        async function loadCollected() {
            try {
                const data = await apiCall('GET', `/api/contacts?deviceId=${currentUser.deviceId}&includeBlocked=true`);
                collectedCards = data.contacts || [];
            } catch (err) {
                console.error('Failed to load collected:', err);
            }
        }

        // ── Filter ──
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(el => {
                el.classList.toggle('active', el.dataset.filter === filter);
            });
            rebuildContent();
        }

        // ── Filter logic (matches Android) ──
        function applyContactFilter(contacts) {
            const sorted = [...contacts].sort((a, b) => {
                if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
                const aTime = a.lastInteractedAt || a.addedAt || 0;
                const bTime = b.lastInteractedAt || b.addedAt || 0;
                return bTime - aTime;
            });
            switch (currentFilter) {
                case 'friends': return sorted.filter(c => !c.blocked && c.exchangeType);
                case 'pinned': return sorted.filter(c => c.pinned);
                default: return sorted;
            }
        }

        // ── Main render ──
        function rebuildContent() {
            if (isSearching) {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('searchResults').style.display = '';
                renderSearchResults();
                return;
            }

            document.getElementById('mainContent').style.display = '';
            document.getElementById('searchResults').style.display = 'none';

            const container = document.getElementById('mainContent');
            let html = '';

            // Section 1: My Cards
            if (myCards.length > 0) {
                html += `<div class="section-header">${t('cardholder_my_cards', 'My Cards')}</div>`;
                html += myCards.map(c => renderMyCardHtml(c)).join('');
            }

            // Section 2: Recent
            const filteredRecent = applyContactFilter(recentCards);
            if (filteredRecent.length > 0) {
                html += `<div class="section-header">${t('cardholder_recent', 'Recent')}</div>`;
                html += filteredRecent.map(c => renderRecentHtml(c)).join('');
            }

            // Section 3: Collected
            const filteredCollected = applyContactFilter(collectedCards);
            if (filteredCollected.length > 0) {
                html += `<div class="section-header">${t('cardholder_collected', 'Collected')}</div>`;
                html += filteredCollected.map(c => renderCollectedHtml(c)).join('');
            }

            // Empty state
            if (myCards.length === 0 && filteredRecent.length === 0 && filteredCollected.length === 0) {
                html = `<div class="empty-state">
                    <div class="empty-state-icon">&#x1F4C7;</div>
                    <div class="empty-state-text">${t('cardholder_empty', 'No cards yet')}</div>
                </div>`;
            }

            container.innerHTML = html;
        }

        // ── My Card rendering ──
        function renderMyCardHtml(c) {
            const avatar = c.avatar || '\u{1F99E}';
            const ac = c.agentCard || {};
            let html = `<div class="card-item" onclick="showMyCardDetail('${escapeAttr(c.publicCode)}')">
                <div class="card-row">
                    <span class="agent-avatar">${renderAvatarHtml(avatar, 48)}</span>
                    <div class="agent-meta">
                        <div class="agent-name">${escapeHtml(c.name || c.publicCode)}</div>
                        <span class="agent-code" onclick="event.stopPropagation(); copyCode('${escapeAttr(c.publicCode)}')" title="Click to copy">${escapeHtml(c.publicCode)}</span>
                    </div>
                </div>`;

            if (c.contactEmail || ac.contactEmail) {
                html += `<div class="card-info-line">\u2709 ${escapeHtml(c.contactEmail || ac.contactEmail)}</div>`;
            }
            if (c.website || ac.website) {
                html += `<div class="card-info-line">\uD83C\uDF10 ${escapeHtml(c.website || ac.website)}</div>`;
            }
            if (c.description || ac.description) {
                html += `<div class="card-desc">${escapeHtml(c.description || ac.description)}</div>`;
            }

            html += '</div>';
            return html;
        }

        // ── Recent rendering ──
        function renderRecentHtml(c) {
            const avatar = c.avatar || (c.character === 'PIG' ? '\u{1F437}' : '\u{1F99E}');
            const snap = c.cardSnapshot || {};
            let html = `<div class="card-item" onclick="openDetail('${escapeAttr(c.publicCode)}')">
                <div class="card-row">
                    <span class="agent-avatar">${renderAvatarHtml(avatar, 48)}</span>
                    <div class="agent-meta">
                        <div class="agent-name">${escapeHtml(c.name || c.publicCode)}</div>
                        <span class="agent-code" onclick="event.stopPropagation(); copyCode('${escapeAttr(c.publicCode)}')">${escapeHtml(c.publicCode)}</span>
                    </div>
                    <span class="agent-status ${c.online ? 'online' : 'offline'}"></span>
                    <div class="card-actions" onclick="event.stopPropagation()">
                        <button class="card-action-btn add-friend" onclick="confirmAddFriend('${escapeAttr(c.publicCode)}', '${escapeAttr(c.name || c.publicCode)}')" title="${t('cardholder_add_friend', 'Add Friend')}">&#x2B;</button>
                        <button class="card-action-btn block-btn ${c.blocked ? 'blocked' : ''}" onclick="toggleBlockFromList('${escapeAttr(c.publicCode)}', ${!!c.blocked})" title="${c.blocked ? t('cardholder_unblock', 'Unblock') : t('cardholder_block', 'Block')}">&#x1F6AB;</button>
                    </div>
                </div>`;

            if (snap.description) html += `<div class="card-desc">${escapeHtml(snap.description)}</div>`;
            if (snap.contactEmail) html += `<div class="card-info-line">\u2709 ${escapeHtml(snap.contactEmail)}</div>`;
            if (snap.website) html += `<div class="card-info-line">\uD83C\uDF10 ${escapeHtml(snap.website)}</div>`;

            html += '</div>';
            return html;
        }

        // ── Collected rendering ──
        function renderCollectedHtml(c) {
            const avatar = c.avatar || (c.character === 'PIG' ? '\u{1F437}' : '\u{1F99E}');
            const snap = c.cardSnapshot || {};
            let html = `<div class="card-item ${c.pinned ? 'pinned' : ''} ${c.blocked ? 'blocked' : ''}" onclick="openDetail('${escapeAttr(c.publicCode)}')">
                <div class="card-row">
                    <span class="agent-avatar">${renderAvatarHtml(avatar, 48)}</span>
                    <div class="agent-meta">
                        <div class="agent-name">${escapeHtml(c.name || c.publicCode)}</div>
                        <span class="agent-code" onclick="event.stopPropagation(); copyCode('${escapeAttr(c.publicCode)}')">${escapeHtml(c.publicCode)}</span>
                    </div>
                    <span class="agent-status ${c.online ? 'online' : 'offline'}"></span>
                </div>`;

            if (snap.description) html += `<div class="card-desc">${escapeHtml(snap.description)}</div>`;
            if (snap.contactEmail) html += `<div class="card-info-line">\u2709 ${escapeHtml(snap.contactEmail)}</div>`;
            if (snap.website) html += `<div class="card-info-line">\uD83C\uDF10 ${escapeHtml(snap.website)}</div>`;

            html += '</div>';
            return html;
        }

        // ── Search ──
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchDebounce);
            const query = this.value.trim();
            if (!query) {
                isSearching = false;
                searchSaved = [];
                searchExternal = [];
                rebuildContent();
                return;
            }
            if (query.length < 2) return;
            searchDebounce = setTimeout(() => performSearch(query), 300);
        });

        async function performSearch(query) {
            try {
                const data = await apiCall('GET', `/api/contacts/search?deviceId=${currentUser.deviceId}&q=${encodeURIComponent(query)}`);
                searchSaved = data.saved || data.cards || [];
                searchExternal = data.external || [];
                isSearching = true;
                rebuildContent();
            } catch (err) {
                console.error('Search error:', err);
            }
        }

        function renderSearchResults() {
            const container = document.getElementById('searchResults');
            let html = '';

            if (searchSaved.length > 0) {
                html += `<div class="search-results-title">${t('cardholder_search_saved', 'Saved')}</div>`;
                html += searchSaved.map(c => renderCollectedHtml(c)).join('');
            }

            if (searchExternal.length > 0) {
                html += `<div class="search-results-title">${t('cardholder_search_external', 'Online Agents')}</div>`;
                html += searchExternal.map(c => {
                    const avatar = c.avatar || '\u{1F99E}';
                    const snap = c.agentCard || {};
                    return `<div class="card-item">
                        <div class="card-row">
                            <span class="agent-avatar">${renderAvatarHtml(avatar, 48)}</span>
                            <div class="agent-meta">
                                <div class="agent-name">${escapeHtml(c.name || c.publicCode)}</div>
                                <span class="agent-code">${escapeHtml(c.publicCode)}</span>
                            </div>
                            <span class="agent-status online"></span>
                        </div>
                        ${snap.description ? `<div class="card-desc">${escapeHtml(snap.description)}</div>` : ''}
                        <div class="add-card-btn" onclick="addCard('${escapeAttr(c.publicCode)}')">+ ${t('cardholder_add_friend', 'Add')}</div>
                    </div>`;
                }).join('');
            }

            if (searchSaved.length === 0 && searchExternal.length === 0) {
                html = `<div class="empty-state">
                    <div class="empty-state-icon">&#x1F50D;</div>
                    <div class="empty-state-text">${t('cardholder_no_match', 'No matching cards')}</div>
                </div>`;
            }

            container.innerHTML = html;
        }

        // ── My Card Detail dialog (editable, dashboard-style) ──
        function showMyCardDetail(publicCode) {
            const card = myCards.find(c => c.publicCode === publicCode);
            if (!card) return;

            const ac = card.agentCard || {};
            const avatar = card.avatar || '\u{1F99E}';

            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="modal-header">
                    <span class="agent-avatar">${renderAvatarHtml(avatar, 48)}</span>
                    <div class="modal-header-info">
                        <h3>${escapeHtml(card.name || card.publicCode)}</h3>
                        <span class="agent-code" onclick="copyCode('${escapeAttr(card.publicCode)}')">${escapeHtml(card.publicCode)}</span>
                    </div>
                    <button class="modal-close" onclick="closeDetail()">&#x2715;</button>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">${t('cardholder_edit_agent_card', 'Edit Agent Card')}</div>

                    <div class="edit-field">
                        <label>${t('cardholder_description', 'Description')}</label>
                        <textarea id="edit-desc" rows="3" maxlength="500" style="resize:vertical;" placeholder="${t('cardholder_desc_placeholder', 'Describe this entity\'s purpose and capabilities...')}">${escapeHtml(ac.description || '')}</textarea>
                    </div>

                    <div class="edit-field">
                        <label>${t('cardholder_capabilities', 'Capabilities')}</label>
                        <div class="ac-caps-list" id="editCaps"></div>
                        <button class="btn btn-sm btn-outline" onclick="addEditCapability()" style="font-size:12px;">+ ${t('cardholder_add_capability', 'Add Capability')}</button>
                    </div>

                    <div class="edit-field">
                        <label>${t('cardholder_protocols', 'Protocols')}</label>
                        <div class="ac-tags" id="editProtos"></div>
                        <div class="ac-tag-input">
                            <input type="text" id="editProtoInput" placeholder="e.g. A2A, REST, gRPC" maxlength="64">
                            <button class="btn btn-sm btn-outline" onclick="addEditTag('editProtos', 'editProtoInput', 10)">+</button>
                        </div>
                    </div>

                    <div class="edit-field">
                        <label>${t('cardholder_tags', 'Tags')}</label>
                        <div class="ac-tags" id="editTags"></div>
                        <div class="ac-tag-input">
                            <input type="text" id="editTagInput" placeholder="${t('cardholder_tags_placeholder', 'tag1, tag2, tag3')}" maxlength="64">
                            <button class="btn btn-sm btn-outline" onclick="addEditTag('editTags', 'editTagInput', 20)">+</button>
                        </div>
                    </div>

                    <div class="edit-field">
                        <label>Version</label>
                        <input type="text" id="edit-version" value="${escapeAttr(ac.version || '')}" maxlength="50" placeholder="1.0.0">
                    </div>

                    <div class="edit-field">
                        <label>Website</label>
                        <input type="url" id="edit-website" value="${escapeAttr(ac.website || '')}" maxlength="500" placeholder="https://...">
                    </div>

                    <div class="edit-field">
                        <label>Email</label>
                        <input type="email" id="edit-email" value="${escapeAttr(ac.contactEmail || '')}" maxlength="255" placeholder="contact@example.com">
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-primary btn-sm" onclick="saveAgentCard('${escapeAttr(card.publicCode)}')">${t('common_save', 'Save')}</button>
                    <button class="btn btn-outline btn-sm" onclick="closeDetail()">${t('common_cancel', 'Cancel')}</button>
                </div>`;

            // Populate capabilities
            (ac.capabilities || []).forEach(function(cap) {
                appendEditCapability(cap.name || '', cap.description || '');
            });

            // Populate protocols
            renderEditTags('editProtos', ac.protocols || []);

            // Populate tags
            renderEditTags('editTags', ac.tags || []);

            document.getElementById('detailModal').classList.add('open');
        }

        // ── Dashboard-style edit helpers ──
        function appendEditCapability(name, desc) {
            const container = document.getElementById('editCaps');
            const row = document.createElement('div');
            row.className = 'ac-cap-item';
            row.innerHTML = '<input type="text" placeholder="Name" value="' + escapeHtml(name) + '" class="ac-cap-name" style="padding:6px 8px;border:1px solid var(--card-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:12px;">' +
                '<input type="text" placeholder="Description" value="' + escapeHtml(desc) + '" class="ac-cap-desc" style="padding:6px 8px;border:1px solid var(--card-border);border-radius:4px;background:var(--input-bg);color:var(--text);font-size:12px;">' +
                '<button class="ac-cap-remove" title="Remove">&times;</button>';
            row.querySelector('.ac-cap-remove').onclick = function() { row.remove(); };
            container.appendChild(row);
        }

        function addEditCapability() {
            const container = document.getElementById('editCaps');
            if (container.children.length >= 10) {
                showToast('Maximum 10 capabilities', 'error');
                return;
            }
            appendEditCapability('', '');
        }

        function renderEditTags(containerId, tags) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            tags.forEach(function(tag) {
                const span = document.createElement('span');
                span.className = 'ac-tag';
                span.innerHTML = escapeHtml(tag) + ' <button class="ac-tag-remove">&times;</button>';
                span.querySelector('.ac-tag-remove').onclick = function() { span.remove(); };
                container.appendChild(span);
            });
        }

        function addEditTag(containerId, inputId, maxCount) {
            const input = document.getElementById(inputId);
            const container = document.getElementById(containerId);
            const val = (input.value || '').trim();
            if (!val) return;
            if (container.children.length >= maxCount) {
                showToast('Maximum ' + maxCount + ' items', 'error');
                return;
            }
            const span = document.createElement('span');
            span.className = 'ac-tag';
            span.innerHTML = escapeHtml(val) + ' <button class="ac-tag-remove">&times;</button>';
            span.querySelector('.ac-tag-remove').onclick = function() { span.remove(); };
            container.appendChild(span);
            input.value = '';
        }

        // ── Contact Detail dialog (with Details / Chat History tabs) ──
        function openDetail(publicCode) {
            const card = collectedCards.find(c => c.publicCode === publicCode)
                      || recentCards.find(c => c.publicCode === publicCode);
            if (!card) return;

            const snap = card.cardSnapshot || {};
            const avatar = card.avatar || (card.character === 'PIG' ? '\u{1F437}' : '\u{1F99E}');
            const caps = snap.capabilities || [];
            const tags = snap.tags || [];
            const protocols = snap.protocols || [];

            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="modal-header">
                    <span class="agent-avatar">${renderAvatarHtml(avatar, 48)}</span>
                    <div class="modal-header-info">
                        <h3>${escapeHtml(card.name || card.publicCode)}</h3>
                        <span class="agent-code" onclick="copyCode('${escapeAttr(card.publicCode)}')">${escapeHtml(card.publicCode)}</span>
                        <span class="agent-status ${card.online ? 'online' : 'offline'}" style="display:inline-block; margin-left:8px; vertical-align:middle;"></span>
                        ${card.blocked ? `<span style="display:inline-block; margin-left:8px; font-size:12px; background:var(--danger); color:#fff; padding:1px 6px; border-radius:4px;">${t('cardholder_blocked_label', 'Blocked')}</span>` : ''}
                    </div>
                    <button class="modal-close" onclick="closeDetail()">&#x2715;</button>
                </div>

                <div class="modal-tabs">
                    <button class="modal-tab active" onclick="switchModalTab(this, 'detailsPanel')">Details</button>
                    <button class="modal-tab" onclick="switchModalTab(this, 'chatPanel'); loadChatHistory('${escapeAttr(card.publicCode)}')">Chat History</button>
                </div>

                <div id="detailsPanel" class="modal-panel active">
                    ${snap.description ? `<div class="modal-section">
                        <div class="modal-section-title">${t('cardholder_description', 'Description')}</div>
                        <div style="font-size:14px; line-height:1.5; color:var(--text-secondary);">${escapeHtml(snap.description)}</div>
                    </div>` : ''}

                    ${snap.contactEmail ? `<div class="modal-section">
                        <div class="modal-section-title">Email</div>
                        <div style="font-size:14px;"><a href="mailto:${escapeAttr(snap.contactEmail)}" style="color:var(--primary);">${escapeHtml(snap.contactEmail)}</a></div>
                    </div>` : ''}

                    ${snap.website ? `<div class="modal-section">
                        <div class="modal-section-title">Website</div>
                        <div style="font-size:14px;"><a href="${escapeAttr(snap.website)}" target="_blank" rel="noopener" style="color:var(--primary);">${escapeHtml(snap.website)}</a></div>
                    </div>` : ''}

                    ${snap.version ? `<div class="modal-section">
                        <div class="modal-section-title">Version</div>
                        <div style="font-size:14px; color:var(--text-secondary);">${escapeHtml(snap.version)}</div>
                    </div>` : ''}

                    ${caps.length ? `<div class="modal-section">
                        <div class="modal-section-title">${t('cardholder_capabilities', 'Capabilities')}</div>
                        <div class="cap-list">
                            ${caps.map(cp => `<div class="cap-item"><div class="cap-name">${escapeHtml(cp.name)}</div>${cp.description ? `<div class="cap-desc">${escapeHtml(cp.description)}</div>` : ''}</div>`).join('')}
                        </div>
                    </div>` : ''}

                    ${tags.length ? `<div class="modal-section">
                        <div class="modal-section-title">${t('cardholder_tags', 'Tags')}</div>
                        <div class="tag-list">${tags.map(tg => `<span class="tag-badge">#${escapeHtml(tg)}</span>`).join('')}</div>
                    </div>` : ''}

                    ${protocols.length ? `<div class="modal-section">
                        <div class="modal-section-title">${t('cardholder_protocols', 'Protocols')}</div>
                        <div class="protocol-list">${protocols.map(p => `<span class="protocol-badge">${escapeHtml(p)}</span>`).join('')}</div>
                    </div>` : ''}

                    <div class="modal-section">
                        <div class="modal-section-title">${t('cardholder_details', 'Details')}</div>
                        <div class="detail-row">
                            <span class="detail-label">${t('cardholder_exchange_type', 'Exchange Type')}</span>
                            <span class="detail-value">${(card.exchangeType || 'manual').replace('_', ' ')}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">${t('cardholder_interactions', 'Interactions')}</span>
                            <span class="detail-value">${card.interactionCount || 0}</span>
                        </div>
                        ${card.addedAt ? `<div class="detail-row">
                            <span class="detail-label">${t('cardholder_added', 'Added')}</span>
                            <span class="detail-value">${new Date(card.addedAt).toLocaleDateString()}</span>
                        </div>` : ''}
                    </div>
                </div>

                <div id="chatPanel" class="modal-panel">
                    <div class="modal-section">
                        <div class="chat-history-list" id="chatHistoryList">
                            <div class="chat-empty">${t('common_loading', 'Loading...')}</div>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-outline btn-sm" onclick="togglePin('${escapeAttr(card.publicCode)}')">
                        ${card.pinned ? t('cardholder_unpin', 'Unpin') : t('cardholder_pin', 'Pin')}
                    </button>
                    <button class="btn btn-outline btn-sm" onclick="toggleBlock('${escapeAttr(card.publicCode)}')" style="${card.blocked ? 'color:var(--success);border-color:var(--success);' : 'color:var(--danger);border-color:var(--danger);'}">
                        ${card.blocked ? t('cardholder_unblock', 'Unblock') : t('cardholder_block', 'Block')}
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="refreshCard('${escapeAttr(card.publicCode)}')">
                        ${t('cardholder_refresh', 'Refresh')}
                    </button>
                    <button class="btn btn-outline btn-sm" style="color:var(--danger);border-color:var(--danger);" onclick="removeCard('${escapeAttr(card.publicCode)}')">
                        ${t('common_remove', 'Remove')}
                    </button>
                </div>`;

            document.getElementById('detailModal').classList.add('open');
        }

        function switchModalTab(tabEl, panelId) {
            tabEl.parentElement.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
            tabEl.classList.add('active');
            tabEl.closest('.modal-card').querySelectorAll('.modal-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(panelId).classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('open');
        }

        // ── Chat History ──
        async function loadChatHistory(publicCode) {
            const container = document.getElementById('chatHistoryList');
            try {
                const data = await apiCall('GET', `/api/chat/history-by-code?deviceId=${currentUser.deviceId}&deviceSecret=${currentUser.deviceSecret}&publicCode=${publicCode}&limit=30`);
                const messages = data.messages || [];
                if (messages.length === 0) {
                    container.innerHTML = `<div class="chat-empty">${t('cardholder_no_chat_history', 'No chat history')}</div>`;
                    return;
                }
                container.innerHTML = messages.map(m => {
                    const isSent = m.direction === 'outgoing' || m.fromDevice === currentUser.deviceId;
                    const time = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
                    return `<div class="chat-msg ${isSent ? 'sent' : 'received'}">
                        <div>${escapeHtml(m.content || m.message || '')}</div>
                        <div class="chat-time">${time}</div>
                    </div>`;
                }).join('');
            } catch (err) {
                container.innerHTML = `<div class="chat-empty">${t('cardholder_chat_history_error', 'Could not load chat history')}</div>`;
            }
        }

        // ── Actions ──
        async function saveAgentCard(publicCode) {
            const desc = document.getElementById('edit-desc').value.trim();
            const email = document.getElementById('edit-email').value.trim();
            const website = document.getElementById('edit-website').value.trim();
            const version = document.getElementById('edit-version').value.trim();

            // Collect capabilities (dashboard-style)
            const caps = [];
            document.querySelectorAll('#editCaps .ac-cap-item').forEach(function(row) {
                const name = row.querySelector('.ac-cap-name').value.trim();
                const cdesc = row.querySelector('.ac-cap-desc').value.trim();
                if (name) caps.push({ id: name.toLowerCase().replace(/\s+/g, '-'), name: name, description: cdesc });
            });

            // Collect protocols (tag chips)
            const protocols = [];
            document.querySelectorAll('#editProtos .ac-tag').forEach(function(tag) {
                const v = tag.firstChild.textContent.trim();
                if (v) protocols.push(v);
            });

            // Collect tags (tag chips)
            const tags = [];
            document.querySelectorAll('#editTags .ac-tag').forEach(function(tag) {
                const v = tag.firstChild.textContent.trim();
                if (v) tags.push(v);
            });

            const agentCard = {
                description: desc,
                capabilities: caps,
                protocols: protocols,
                tags: tags,
                version: version,
                website: website,
                contactEmail: email
            };

            try {
                await apiCall('PUT', '/api/entity/agent-card', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    publicCode,
                    agentCard
                });
                showToast(t('common_saved', 'Saved'));
                closeDetail();
                await loadMyCards();
                rebuildContent();
            } catch (err) {
                showToast(err.message || 'Error', 'error');
            }
        }

        function confirmAddFriend(publicCode, name) {
            if (confirm(`${t('cardholder_add_friend', 'Add Friend')}: ${name}?`)) {
                addCard(publicCode);
            }
        }

        async function addCard(publicCode) {
            try {
                const data = await apiCall('POST', '/api/contacts', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    publicCode
                });
                if (data.success) {
                    collectedCards.unshift(data.contact);
                    showToast(t('cardholder_added_ok', 'Card added'));
                    rebuildContent();
                }
            } catch (err) {
                if (err.status === 409) {
                    showToast(t('cardholder_duplicate', 'Already in card holder'), 'error');
                } else if (err.status === 400 && err.message && err.message.includes('own')) {
                    showToast(t('cardholder_self', 'Cannot add your own entity'), 'error');
                } else {
                    showToast(err.message || t('common_error', 'Error'), 'error');
                }
            }
        }

        async function toggleBlockFromList(publicCode, currentlyBlocked) {
            if (!currentlyBlocked && !confirm(t('cardholder_block_confirm', 'Block this agent? They will not be able to send you messages.'))) return;
            try {
                await apiCall('PATCH', `/api/contacts/${publicCode}`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    blocked: !currentlyBlocked
                });
                showToast(!currentlyBlocked ? t('cardholder_blocked_ok', 'Agent blocked') : t('cardholder_unblocked_ok', 'Agent unblocked'));
                // Update local state
                const c = recentCards.find(r => r.publicCode === publicCode) || collectedCards.find(r => r.publicCode === publicCode);
                if (c) c.blocked = !currentlyBlocked;
                rebuildContent();
            } catch (err) {
                showToast(err.message || 'Error', 'error');
            }
        }

        async function togglePin(publicCode) {
            const card = collectedCards.find(c => c.publicCode === publicCode);
            if (!card) return;
            try {
                await apiCall('PATCH', `/api/contacts/${publicCode}`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    pinned: !card.pinned
                });
                card.pinned = !card.pinned;
                rebuildContent();
                openDetail(publicCode);
                showToast(card.pinned ? t('cardholder_pinned', 'Pinned') : t('cardholder_unpinned', 'Unpinned'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function toggleBlock(publicCode) {
            const card = collectedCards.find(c => c.publicCode === publicCode);
            if (!card) return;
            const newBlocked = !card.blocked;
            if (newBlocked && !confirm(t('cardholder_block_confirm', 'Block this agent?'))) return;
            try {
                await apiCall('PATCH', `/api/contacts/${publicCode}`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    blocked: newBlocked
                });
                card.blocked = newBlocked;
                rebuildContent();
                openDetail(publicCode);
                showToast(newBlocked ? t('cardholder_blocked_ok', 'Agent blocked') : t('cardholder_unblocked_ok', 'Agent unblocked'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function refreshCard(publicCode) {
            try {
                const data = await apiCall('POST', `/api/contacts/${publicCode}/refresh`, {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret
                });
                const card = collectedCards.find(c => c.publicCode === publicCode);
                if (card && data.card) {
                    card.cardSnapshot = data.card.cardSnapshot;
                    card.lastRefreshed = data.card.lastRefreshed;
                }
                rebuildContent();
                openDetail(publicCode);
                showToast(t('cardholder_refreshed_ok', 'Card refreshed'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function removeCard(publicCode) {
            const card = collectedCards.find(c => c.publicCode === publicCode);
            const name = card ? (card.name || card.publicCode) : publicCode;
            if (!confirm(t('cardholder_remove_confirm', `Remove ${name} from card holder?`).replace('{name}', name))) return;
            try {
                await apiCall('DELETE', '/api/contacts', {
                    deviceId: currentUser.deviceId,
                    deviceSecret: currentUser.deviceSecret,
                    publicCode
                });
                collectedCards = collectedCards.filter(c => c.publicCode !== publicCode);
                closeDetail();
                rebuildContent();
                showToast(t('cardholder_removed', 'Card removed'));
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code).then(() => showToast(t('common_copied', 'Copied')));
        }

        // ── Helpers ──
        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function escapeAttr(s) { return escapeHtml(s); }

        function t(key, fallback) {
            return typeof i18n !== 'undefined' ? i18n.t(key) : fallback;
        }

        function showToast(msg, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeDetail();
        });
    </script>
</body>

</html>
