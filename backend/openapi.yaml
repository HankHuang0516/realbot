      operationId: a2aTaskSend
      security:
        - BearerAuth: []
        - DeviceSecret: []
        - BotSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jsonrpc:
                  type: string
                  example: "2.0"
                id:
                  type: string
                method:
                  type: string
                  example: tasks/send
                params:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    targetAgent:
                      type: string
                      description: Public code of target entity
                    message:
                      type: object
                      required: [parts]
                      properties:
                        role:
                          type: string
                          enum: [user, agent]
                        parts:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                enum: [text]
                              text:
                                type: string
      responses:
        '200':
          description: Task created/continued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                  result:
                    type: object
                    properties:
                      id:
                        type: string
                      status:
                        type: object
                        properties:
                          state:
                            type: string
                            enum: [submitted, working, completed, canceled, failed, input-required]
                          timestamp:
                            type: string

  /api/a2a/tasks/{taskId}:
    get:
      tags: [Mission]
      summary: Get A2A task status
      operationId: a2aTaskGet
      security:
        - BearerAuth: []
        - DeviceSecret: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: deviceId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                  result:
                    type: object
        '404':
          description: Task not found

  /api/a2a/tasks/{taskId}/cancel:
    post:
      tags: [Mission]
      summary: Cancel an A2A task
      operationId: a2aTaskCancel
      security:
        - BearerAuth: []
        - DeviceSecret: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceId:
                  type: string
      responses:
        '200':
          description: Task canceled
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Task not found

  # ── OAuth 2.0 ──
  /api/oauth/clients:
    post:
      tags: [Auth]
      summary: Register OAuth 2.0 client
      operationId: registerOAuthClient
      security:
        - DeviceSecret: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_name]
              properties:
                client_name:
                  type: string
                redirect_uris:
                  type: array
                  items:
                    type: string
                    format: uri
                grant_types:
                  type: array
                  items:
                    type: string
                    enum: [authorization_code, client_credentials, refresh_token]
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [read, write, entity:manage, mission:manage, admin]
      responses:
        '201':
          description: Client registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  client_secret:
                    type: string
                  client_name:
                    type: string
    get:
      tags: [Auth]
      summary: List own OAuth clients
      operationId: listOAuthClients
      security:
        - DeviceSecret: []
        - CookieAuth: []
      responses:
        '200':
          description: Client list
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      type: object

  /api/oauth/token:
    post:
      tags: [Auth]
      summary: Token endpoint (authorization_code, client_credentials, refresh_token)
      operationId: oauthToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type, client_id, client_secret]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, client_credentials, refresh_token]
                client_id:
                  type: string
                client_secret:
                  type: string
                code:
                  type: string
                redirect_uri:
                  type: string
                refresh_token:
                  type: string
                scope:
                  type: string
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                  refresh_token:
                    type: string
                  scope:
                    type: string

  /api/oauth/revoke:
    post:
      tags: [Auth]
      summary: Revoke token (RFC 7009)
      operationId: oauthRevoke
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
      responses:
        '200':
          description: Token revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/oauth/introspect:
    post:
      tags: [Auth]
      summary: Token introspection (RFC 7662)
      operationId: oauthIntrospect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token info
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  scope:
                    type: string
                  client_id:
                    type: string
                  token_type:
                    type: string
                  exp:
                    type: integer

  # ── Bot Tools ──
  /api/bot/web-search:
    get:
