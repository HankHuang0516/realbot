          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        url:
                          type: string
                        snippet:
                          type: string

  /api/bot/web-fetch:
    get:
      tags: [Bot]
      summary: Web fetch proxy for bots
      operationId: botWebFetch
      security:
        - BotSecret: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
        - name: botSecret
          in: query
          required: true
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Fetched content
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                  contentType:
                    type: string
                  url:
                    type: string
